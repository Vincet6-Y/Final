<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 px-6 lg:px-20 py-10 max-w-7xl mx-auto w-full">
            <div class="flex flex-col lg:flex-row gap-10">
                <aside class="w-full lg:w-48 flex-shrink-0">
                    <div
                        class="bg-white dark:bg-white/5 p-6 rounded-2xl border border-slate-200 dark:border-white/10 sticky top-24">
                        <h3 class="text-slate-900 dark:text-white font-bold mb-4 flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-xl">filter_list</span>
                            行程篩選
                        </h3>
                        <div class="space-y-4">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input checked=""
                                    class="w-5 h-5 border-slate-300 text-primary focus:ring-primary dark:bg-white/10 dark:border-white/20"
                                    name="duration" type="radio" />
                                <span
                                    class="text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors font-medium">5天假期</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input
                                    class="w-5 h-5 border-slate-300 text-primary focus:ring-primary dark:bg-white/10 dark:border-white/20"
                                    name="duration" type="radio" />
                                <span
                                    class="text-slate-600 dark:text-slate-300 group-hover:text-primary transition-colors font-medium">10天假期</span>
                            </label>
                        </div>
                    </div>
                </aside>
                <div class="flex-1">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

                        <a th:each="plan : ${journeyPlans}"
                            th:href="@{/packageTourDetail(planId=${plan.planId})}"
                            class="group bg-[#2a2621] rounded-2xl overflow-hidden border border-slate-700/50 hover:border-primary/50 transition-all flex flex-col cursor-pointer block shadow-lg">

                            <div class="p-4 flex items-center justify-between z-10 bg-[#25201b]">
                                <h4 class="text-white font-bold text-[17px] truncate tracking-wide" th:text="${plan.planName}">行程名稱</h4>

                                <button th:onclick="'event.preventDefault(); toggleFavorite(this, ' + ${plan.planId} + ')'"
                                    class="text-primary hover:scale-110 transition-transform shrink-0">
                                    <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
                                </button>
                            </div>

                            <div class="relative aspect-square w-full bg-slate-800">

                                <img th:if="${plan.workDetail != null && plan.workDetail.workImg != null}"
                                    th:src="${plan.workDetail.workImg}"
                                    class="w-full h-full object-cover" alt="行程劇照" />

                                <div th:unless="${plan.workDetail != null && plan.workDetail.workImg != null}"
                                    class="w-full h-full bg-slate-700 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-white/20 text-6xl">image</span>
                                </div>

                                <div class="absolute bottom-3 left-3">
                                    <span class="bg-[#ff7b00] text-black px-3 py-1 rounded-md text-sm font-bold shadow-md tracking-wider"
                                        th:text="${plan.workDetail != null ? plan.workDetail.workClass : '福岡'}">城市</span>
                                </div>
                            </div>
                        </a>

                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    </div>

</body>

</html>
