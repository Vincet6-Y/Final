<!doctype html>
<html class="dark" lang="zh-Hant">
    <head>
    <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
    <link rel="stylesheet" th:href="@{/member/css/cardSlide.css}" />
    </head>

    <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
        <header th:replace="~{ fragments/header :: myHeader}"></header>

        <main class="flex-grow flex items-center justify-center py-16 px-6 relative overflow-hidden">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
            
            <div id="authStage" class="auth-stage relative z-10">
                <!-- 左邊/右邊會互換位置的 表單卡 -->
                <div class="auth-card form-card">
                    <div class="auth-switch mobile-only">
                        <button type="button" id="mobileShowLoginBtn" class="auth-switch-btn active">登入</button>
                        <button type="button" id="mobileShowRegisterBtn" class="auth-switch-btn">註冊</button>
                    </div>
                    <div th:replace="~{login/loginForm :: loginForm}"></div>
                    <div th:replace="~{login/registerForm :: registerForm}"></div>
                </div>
                <!-- 左邊/右邊會互換位置的 圖片卡 -->
                <div class="auth-card hero-card">
                    <div th:replace="~{login/loginHero :: loginHero}"></div>
                    <div th:replace="~{login/registerHero :: registerHero}"></div>
                </div>
            </div>
        </main>
        <div id="toast"
            th:if="${param.msg}"
            th:data-msg="${param.msg[0]}"
            class="fixed top-24 right-6 z-[9999] hidden min-w-[260px] max-w-[360px]
                    rounded-xl border px-4 py-3 shadow-lg
                    transition-all duration-300 opacity-0 translate-y-[-8px]">
            <div class="flex items-start gap-3">
                <span id="toastIcon" class="material-symbols-outlined text-xl">info</span>
                <div>
                    <p id="toastTitle" class="font-bold text-sm"></p>
                    <p id="toastText" class="text-sm mt-1 opacity-90"></p>
                </div>
            </div>
        </div>
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script th:src="@{/member/js/cardSlide.js}"></script>
        <script th:src="@{/member/js/passwdEyeIcon.js}"></script>

    </body>
</html>
