<!doctype html>
<html class="dark" lang="zh-Hant">

<head>
    <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
    <link rel="stylesheet" th:href="@{/member/css/cardSlide.css}" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <header th:replace="~{ fragments/header :: myHeader}"></header>

    <main class="flex-grow flex items-center justify-center py-16 px-6 relative overflow-hidden">
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none">
        </div>

        <div id="authStage" class="auth-stage relative z-10"
            th:classappend="${openPanel == 'register'} ? ' register-mode' : ''">
            <!-- 左邊/右邊會互換位置的 表單卡 -->
            <div class="auth-card form-card">
                <div class="auth-switch mobile-only">
                    <button type="button" id="mobileShowLoginBtn" class="auth-switch-btn"
                        th:classappend="${openPanel != 'register'} ? ' active' : ''">登入</button>
                    <button type="button" id="mobileShowRegisterBtn" class="auth-switch-btn"
                        th:classappend="${openPanel == 'register'} ? ' active' : ''">註冊</button>
                </div>
                <div th:replace="~{login/loginForm :: loginForm}"></div>
                <div th:replace="~{login/registerForm :: registerForm}"></div>
            </div>
            <!-- 左邊/右邊會互換位置的 圖片卡 -->
            <div class="auth-card hero-card">
                <div th:replace="~{login/loginHero :: loginHero}"></div>
                <div th:replace="~{login/registerHero :: registerHero}"></div>
            </div>
        </div>
    </main>
    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    <th:block th:replace="~{login/toastInfo :: toast}"></th:block>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/member/js/cardSlide.js}"></script>
    <script th:src="@{/member/js/passwdEyeIcon.js}"></script>
    <script th:src="@{/assets/toast.js}"></script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
    getAuth,
    GoogleAuthProvider,
    signInWithRedirect,
    getRedirectResult
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyA6gE3Tlb97Gb6qLuhccu0EXdQnj_nVNcY",
    authDomain: "anime-travel-website.firebaseapp.com",
    projectId: "anime-travel-website",
    storageBucket: "anime-travel-website.firebasestorage.app",
    messagingSenderId: "756988685588",
    appId: "1:756988685588:web:7f13d7c3f1f507f7dba601"
    };

    // 初始化
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 👉 點擊 Google 登入
    document.getElementById("googleLoginBtn")?.addEventListener("click", () => {
    signInWithRedirect(auth, provider);
    });

    // 👉 回來後處理登入結果
    window.addEventListener("load", async () => {
    try {
        const result = await getRedirectResult(auth);

        if (!result) return;

        const user = result.user;
        const idToken = await user.getIdToken();

        const response = await fetch("/auth/google/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            idToken: idToken
        })
        });

        const data = await response.json();

        if (data.success) {
        window.location.href = data.redirectUrl || "/home";
        } else {
        alert(data.message || "登入失敗");
        }

    } catch (e) {
        console.error(e);
        alert("Google 登入失敗");
    }
    });
    </script>
</body>

</html>
