<th:block th:fragment="purchaseModal">
    <div id="purchaseDetailModal" class="fixed inset-0 z-[999] hidden items-center justify-center">

        <div id="purchaseDetailBackdrop"
            class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <!-- modal 主容器 -->
        <div id="purchaseDetailPanel"
            class="relative z-10 w-[92%] max-w-4xl max-h-[90vh] overflow-y-auto rounded-[2rem] border border-white/10 bg-[#231a0f] text-slate-100 shadow-2xl opacity-0 scale-95 transition-all duration-300">

            <button id="closePurchaseDetailModal" type="button"
                class="absolute top-5 right-5 text-slate-300 hover:text-white transition">
                <span class="material-symbols-outlined text-[32px]">close</span>
            </button>

            <div class="p-6 md:p-8">
                <h3 id="purchaseDetailTitle" class="text-2xl md:text-3xl font-bold mb-3 pr-10"></h3>

                <div class="space-y-2 text-sm md:text-base text-slate-300 mb-6">
                    <p>購買日期：<span id="purchaseDetailDate"></span></p>

                    <div>
                        <span id="purchaseDetailStatus"
                            class="inline-flex px-3 py-1 rounded-md bg-green-500/10 text-green-400 text-sm font-semibold">
                        </span>
                    </div>
                </div>
            </div>

            <div class="px-6 md:px-8 mb-8">
                <div class="w-full h-40 md:h-56 rounded-[1.5rem] overflow-hidden border border-white/10 bg-white/5">
                    <img id="purchaseDetailImage" src="" alt="購買明細封面圖" class="w-full h-full object-cover">
                </div>
            </div>
            <!-- 景點票券列表 (JS 動態生成) -->
            <div id="purchaseDetailItems" class="px-6 md:px-8 mb-8"></div>

            <div class="px-6 md:px-8 pt-6 pb-8 relative flex items-center justify-center">
                <button id="modalActionBtn" type="button"
                    class="px-5 py-3 bg-primary text-background-dark font-bold rounded-xl hover:opacity-90 transition">
                    前往付款查看行程
                </button>

                <div class="absolute right-6 md:right-8 text-lg md:text-xl font-bold whitespace-nowrap">
                    購買價格：<span id="purchaseDetailPrice" class="text-primary"></span>
                </div>
            </div>
        </div>
    </div>
    </div>
</th:block>
