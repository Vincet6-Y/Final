<th:block th:fragment="purchaseModal">
    <div id="purchaseDetailModal"
         class="fixed inset-0 z-[999] hidden items-center justify-center">
        <!-- modal 背景 -->
        <div id="purchaseDetailBackdrop"
             class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300"></div>
        <!-- modal 主容器 -->
        <div id="purchaseDetailPanel"
             class="relative z-10 w-[92%] max-w-4xl max-h-[90vh] overflow-y-auto rounded-[2rem] border border-white/10 bg-[#231a0f] text-slate-100 shadow-2xl opacity-0 scale-95 transition-all duration-300">
            
             <!-- ================= HEADER ================= -->
            <!-- 這個區塊會 sticky 固定在最上面 -->
            <div class="sticky top-0 z-20 bg-[#231a0f]/95 backdrop-blur-md rounded-t-[2rem] border-b border-white/10 px-6 md:px-8 py-5">
                <div class="flex items-start justify-between gap-4">
                    <!-- 左側：標題 + 前往付款按鈕 + 日期 + 狀態 -->
                    <div class="flex-1 min-w-0">
                        <!-- 行程標題 + 按鈕 -->
                        <div class="flex flex-col md:flex-row md:items-center gap-4">
                            <!-- 行程標題 -->
                            <h3 id="purchaseDetailTitle"
                                class="text-2xl md:text-3xl font-bold leading-tight break-words">
                            </h3>
                            <!-- 前往付款 / 查看行程 -->
                            <button type="button"
                                    class="shrink-0 px-5 py-3 bg-primary text-background-dark font-bold rounded-xl hover:opacity-90 transition">
                                前往付款 / 查看行程
                            </button>
                        </div>
                        <!-- 購買日期 + 付款狀態 -->
                        <div class="text-sm md:text-base text-slate-300 mt-2">
                            <p class="mb-3">
                                購買日期：
                                <span id="purchaseDetailDate"></span>
                            </p>
                            <div class="-mb-1">
                                <span id="purchaseDetailStatus"
                                    class="inline-flex px-3 py-1 rounded-md bg-green-500/10 text-green-400 text-sm font-semibold">
                                </span>
                            </div>
                        </div>
                    </div>
                    <!-- 右側：關閉按鈕 -->
                    <button id="closePurchaseDetailModal"
                            type="button"
                            class="shrink-0 text-slate-300 hover:text-white transition">
                        <span class="material-symbols-outlined text-[32px]">close</span>
                    </button>
                </div>
            </div>

            <!-- ================= CONTENT ================= -->
            <!-- 這個區塊會隨著 scroll 捲動 -->
            <div class="px-6 md:px-8 pt-6 pb-8">
                <!-- 行程封面圖片 -->
                <div class="w-full h-52 md:h-72 rounded-[1.5rem] overflow-hidden border border-white/10 bg-white/5 mb-8">
                    <img id="purchaseDetailImage"
                         src=""
                         alt="購買明細封面圖"
                         class="w-full h-full object-cover">
                </div>
                <!-- 景點票券列表 (JS 動態生成) -->
                <div id="purchaseDetailItems" class="mb-8"></div>
                <!-- 底部價格 -->
                <div class="pt-1 relative">
                    <!-- 右下角購買價格 -->
                    <div class="absolute right-0 text-lg md:text-xl font-bold whitespace-nowrap">
                        購買價格：<span id="purchaseDetailPrice" class="text-primary"></span>
                    </div>
                    <!-- 保留高度避免被 absolute 蓋住 -->
                    <div class="h-8"></div>
                </div>
            </div>
        </div>
    </div>
</th:block>
