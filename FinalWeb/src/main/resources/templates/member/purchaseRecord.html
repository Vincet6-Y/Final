<div th:fragment="purchaseRecord" class="w-full flex flex-col gap-4">
    <div class="flex items-center justify-between mb-2">
        <h2 class="flex items-center gap-2 text-xl font-bold text-orange-500">
            <span class="material-symbols-outlined">receipt_long</span> 購買紀錄
        </h2>
        <a href="javascript:void(0)" id="btn-view-all-orders" th:if="${orders != null && orders.size() > 2}"
            class="text-sm text-slate-500 hover:text-orange-500 transition-colors">查看全部</a>
    </div>

    <div th:if="${orders != null && !orders.isEmpty()}" class="space-y-4">

        <div th:each="order, iterStat : ${orders}"
            th:classappend="${iterStat.index >= 2 ? 'hidden extra-order-card' : ''}"
            class="order-card bg-white/5 dark:bg-[#251d15] border border-slate-200 dark:border-white/10 rounded-2xl p-5 flex flex-col md:flex-row items-start md:items-center gap-5 hover:border-orange-500/30 transition-colors shadow-sm">

            <div class="w-full md:w-40 h-28 rounded-xl overflow-hidden shrink-0 bg-black/20">
                <img alt="行程圖片" class="w-full h-full object-cover"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbLcMmZwh16FnfkOoVi8_4skwM34Nq5WaGZXvk9ukM3To6113tQRms_5gn6R1cp_bMdEarK9QJdi9HTuBFlE7Lp_3N3AVMLo6-HZ0Gmkg1k-nM4NLt1-4oRIghTQQ2jqBV-60kdY1UEfhJnGLlqyC7c1-QwdZJT1cAfEXPrm6Ot0HpKXSdZliYJzmgCEB-jtMLTdchDCHR2rVxi7RJxV0XfRPEA_NxzdVjAC35Z62bBhUwrMXxC2pzsL_9nuRcnXrFwL0n9DcSteU" />
            </div>

            <div class="flex-1 flex flex-col gap-2 w-full">
                <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100"
                    th:text="${order.myPlan != null ? order.myPlan.myPlanName : '自訂聖地巡禮'}">行程名稱</h3>

                <div class="flex flex-wrap items-center gap-3 text-sm mt-1">
                    <th:block th:if="${order.payStatus != '未付款'}">
                        <span class="flex items-center gap-1 text-slate-500 dark:text-slate-400">
                            <span class="material-symbols-outlined text-[16px]">receipt</span>
                            <span th:text="'結帳：' + ${#temporals.format(order.orderTime, 'yyyy.MM.dd')}">結帳日期</span>
                        </span>
                        <span class="text-slate-300 dark:text-slate-600">|</span>
                    </th:block>

                    <span class="flex items-center gap-1 text-slate-500 dark:text-slate-400"
                        th:if="${order.myPlan != null && order.myPlan.startDate != null}">
                        <span class="material-symbols-outlined text-[16px]">flight_takeoff</span>
                        <span th:text="'出發：' + ${#temporals.format(order.myPlan.startDate, 'yyyy.MM.dd')}">出發日期</span>
                    </span>
                    <span class="flex items-center gap-1 text-slate-500 dark:text-slate-400"
                        th:if="${order.myPlan == null || order.myPlan.startDate == null}">
                        <span class="material-symbols-outlined text-[16px]">flight_takeoff</span>
                        <span>出發：尚未設定</span>
                    </span>

                    <span class="px-2.5 py-0.5 rounded-md text-xs font-bold ml-1"
                        th:classappend="${order.payStatus == '未付款'} ? 'bg-red-500/10 text-red-500 border border-red-500/20' : 'bg-green-500/10 text-green-500 border border-green-500/20'"
                        th:text="${order.payStatus}">已完成付款</span>
                </div>
            </div>

            <div class="hidden order-item-list">
                <div th:each="detail : ${order.orderDetails}" class="order-item-data"
                    th:data-name="${detail.ticketType}"
                    th:data-subtotal="'NT$ ' + ${#numbers.formatInteger(detail.ticketPrice, 0, 'COMMA')}">
                </div>
            </div>

            <div
                class="flex flex-row md:flex-col items-center md:items-end justify-between w-full md:w-auto gap-3 shrink-0 mt-4 md:mt-0">
                <span class="text-orange-500 font-bold tracking-wide"
                    th:text="'NT$ ' + ${#numbers.formatInteger(orderTotals.get(order.orderId), 0, 'COMMA')}">NT$
                    0</span>

                <button type="button"
                    class="openPurchaseDetailModal px-5 py-2 bg-slate-100 dark:bg-white/10 hover:bg-orange-500 hover:text-white dark:hover:bg-orange-500 text-slate-700 dark:text-slate-300 text-sm font-bold rounded-lg transition-colors"
                    th:data-order-id="${order.orderId}"
                    th:data-title="${order.myPlan != null ? order.myPlan.myPlanName : '自訂聖地巡禮'}"
                    th:data-date="${#temporals.format(order.orderTime, 'yyyy.MM.dd')}"
                    th:data-status="${order.payStatus}"
                    th:data-price="'NT$ ' + ${#numbers.formatInteger(orderTotals.get(order.orderId), 0, 'COMMA')}"
                    data-image="https://lh3.googleusercontent.com/aida-public/AB6AXuDbLcMmZwh16FnfkOoVi8_4skwM34Nq5WaGZXvk9ukM3To6113tQRms_5gn6R1cp_bMdEarK9QJdi9HTuBFlE7Lp_3N3AVMLo6-HZ0Gmkg1k-nM4NLt1-4oRIghTQQ2jqBV-60kdY1UEfhJnGLlqyC7c1-QwdZJT1cAfEXPrm6Ot0HpKXSdZliYJzmgCEB-jtMLTdchDCHR2rVxi7RJxV0XfRPEA_NxzdVjAC35Z62bBhUwrMXxC2pzsL_9nuRcnXrFwL0n9DcSteU">
                    購買明細
                </button>
            </div>
        </div>
    </div>

    <div th:if="${orders == null || orders.isEmpty()}"
        class="bg-white/5 border border-white/10 rounded-2xl p-12 text-center text-slate-400 flex flex-col items-center justify-center gap-3">
        <span class="material-symbols-outlined text-4xl opacity-50">receipt_long</span>
        <p>目前還沒有購買紀錄喔！趕快去探索聖地吧！</p>
    </div>
</div>
