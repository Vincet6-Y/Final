<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:fragment="myHead">
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff8c00",
                        "background-light": "#ffffff",
                        "background-dark": "#231a0f",
                        "surface-light": "#f3f4f6",
                        "surface-dark": "rgba(255, 255, 255, 0.05)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">聖地圖鑑</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700&amp;display=swap" rel="stylesheet" />
    <!-- <link rel="stylesheet" th:href="@{/fragments/GlobalCss.css}"> -->
    <style type="text/tailwindcss">
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .theme-toggle-sun { display: block; }
        .theme-toggle-moon { display: none; }
        .dark .theme-toggle-sun { display: none; }
        .dark .theme-toggle-moon { display: block; }
    </style>
    
    <script>
    // 立即執行的匿名函式，避免畫面閃爍 (Flash of unstyled content)
    (function() {
        const savedTheme = localStorage.getItem('theme');
        // 檢查記憶：如果是 dark，或者是第一次進來（沒記憶）且使用者電腦偏好深色
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    })();
</script>
</head>

<body>

</body>

</html>
