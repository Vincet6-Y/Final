<!DOCTYPE html>

<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/backendhead :: backHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside th:replace="~{ fragments/backendaside :: backaside('content')}"> </aside>
        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark">
            <!-- Header -->
            <header th:replace="~{ fragments/backendheader :: backendheader('作品與行程管理', '即時監控、編輯與優化您的聖地巡禮內容資源。')}">
            </header>
            <!-- Dashboard Content -->
            <div class="flex-1 overflow-y-auto p-8 space-y-8">
                <!-- Stats Overview -->
                <!-- Management Modules -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- 作品管理 (Manage Works) -->
                    <div class="bg-primary/5 border border-primary/10 rounded-xl overflow-hidden">
                        <div class="p-6 border-b border-primary/10 flex items-center justify-between bg-primary/5">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-primary">movie_edit</span>
                                <h3 class="font-bold text-lg">作品管理</h3>
                            </div>
                            <button class="text-primary text-sm font-bold hover:underline">查看全部</button>
                        </div>
                        <div class="p-6">
                            <div class="space-y-4">
                                <div  th:each=" newWrok : ${newWroks}" 
                                    class="flex items-center gap-4 bg-background-dark/40 p-3 rounded-lg border border-primary/5">
                                    <div class="w-16 h-10 rounded overflow-hidden">
                                        <img class="w-full h-full object-cover" data-alt="Anime scenery illustration"
                                        th:src="${newWrok.workImg}" />
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="text-sm font-bold" th:text="${newWrok.workName}">作品名稱</h4>
                                    </div>
                                    <button class="p-1 hover:bg-primary/20 rounded transition-colors">
                                        <span class="material-symbols-outlined text-sm">edit</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <a th:href="@{/backend/contentmanagement/work}"
                            class="w-full mt-6 py-2 border border-dashed border-primary/30 rounded-lg text-primary text-sm font-bold hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-base">add_circle</span>
                            新增作品資料
                        </a>
                    </div>
                    <!-- 套裝行程管理 (Itinerary Packages) -->
                    <div class="bg-primary/5 border border-primary/10 rounded-xl overflow-hidden">
                        <div class="p-6 border-b border-primary/10 flex items-center justify-between bg-primary/5">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-primary">package_2</span>
                                <h3 class="font-bold text-lg">行程套裝上下架</h3>
                            </div>
                            <button class="text-primary text-sm font-bold hover:underline">查看行程庫</button>
                        </div>
                        <div class="p-6">
                            <div class="space-y-4">
                                <div
                                    class="flex items-center gap-4 bg-background-dark/40 p-4 rounded-lg border border-primary/5">
                                    <div class="flex-1">
                                        <h4 class="text-sm font-bold">鎌倉江之島・灌籃高手朝聖 5日遊</h4>
                                        <p class="text-xs text-slate-500 mt-1">價格: $32,800起 | 目前庫存: 12</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs text-slate-400">狀態</span>
                                        <div class="w-10 h-5 bg-primary/20 rounded-full relative cursor-pointer">
                                            <div class="absolute right-0.5 top-0.5 w-4 h-4 bg-primary rounded-full">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div
                                    class="flex items-center gap-4 bg-background-dark/40 p-4 rounded-lg border border-primary/5">
                                    <div class="flex-1">
                                        <h4 class="text-sm font-bold">飛驒高山・你的名字景點巡覽 4日遊</h4>
                                        <p class="text-xs text-slate-500 mt-1">價格: $28,500起 | 目前庫存: 0</p>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-xs text-slate-400">狀態</span>
                                        <div class="w-10 h-5 bg-slate-700 rounded-full relative cursor-pointer">
                                            <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-slate-400 rounded-full">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-6 flex gap-3">
                                <button
                                    class="flex-1 py-2 bg-primary text-background-dark text-sm font-bold rounded-lg hover:brightness-110 transition-all">快速上架新行程</button>
                                <button
                                    class="px-4 py-2 bg-primary/10 text-primary border border-primary/30 text-sm font-bold rounded-lg hover:bg-primary/20 transition-all">批次管理</button>
                            </div>
                        </div>
                    </div>
                    <!-- 文章發布 (Article Publishing) -->
                    <div class="bg-primary/5 border border-primary/10 rounded-xl overflow-hidden lg:col-span-2">
                        <div class="p-6 border-b border-primary/10 flex items-center justify-between bg-primary/5">
                            <div class="flex items-center gap-3">
                                <span class="material-symbols-outlined text-primary">edit_note</span>
                                <h3 class="font-bold text-lg">文章發布與管理</h3>
                            </div>
                            <div class="flex gap-2">
                                <button
                                    class="px-4 py-1.5 bg-primary text-background-dark text-xs font-bold rounded-full">撰寫新文章</button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead
                                    class="bg-background-dark/50 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                    <tr>
                                        <th class="px-6 py-4">文章標題</th>
                                        <th class="px-6 py-4">關聯作品</th>
                                        <th class="px-6 py-4">作者</th>
                                        <th class="px-6 py-4">狀態</th>
                                        <th class="px-6 py-4 text-right">操作</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-primary/5">
                                    <tr class="hover:bg-primary/5 transition-colors">
                                        <td class="px-6 py-4">
                                            <p class="text-sm font-medium">2024 夏季新番聖地預測指南</p>
                                            <p class="text-[10px] text-slate-500 mt-0.5">發布於 2 小時前</p>
                                        </td>
                                        <td class="px-6 py-4"><span
                                                class="text-xs text-primary bg-primary/10 px-2 py-1 rounded">多項關聯</span>
                                        </td>
                                        <td class="px-6 py-4 text-sm">編輯室 A</td>
                                        <td class="px-6 py-4"><span
                                                class="flex items-center gap-1.5 text-xs text-green-500"><span
                                                    class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> 已發布</span>
                                        </td>
                                        <td class="px-6 py-4 text-right">
                                            <button
                                                class="material-symbols-outlined text-slate-400 hover:text-primary transition-colors">more_horiz</button>
                                        </td>
                                    </tr>
                                    <tr class="hover:bg-primary/5 transition-colors">
                                        <td class="px-6 py-4">
                                            <p class="text-sm font-medium">【專訪】跟著導演細田守走進富山縣的現實世界</p>
                                            <p class="text-[10px] text-slate-500 mt-0.5">最後編輯: 昨天</p>
                                        </td>
                                        <td class="px-6 py-4"><span
                                                class="text-xs text-primary bg-primary/10 px-2 py-1 rounded">狼的孩子雨和雪</span>
                                        </td>
                                        <td class="px-6 py-4 text-sm">特約記者 B</td>
                                        <td class="px-6 py-4"><span
                                                class="flex items-center gap-1.5 text-xs text-amber-500"><span
                                                    class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span> 草稿</span></td>
                                        <td class="px-6 py-4 text-right">
                                            <button
                                                class="material-symbols-outlined text-slate-400 hover:text-primary transition-colors">more_horiz</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
