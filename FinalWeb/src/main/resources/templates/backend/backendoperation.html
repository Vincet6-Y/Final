<!DOCTYPE html>

<html class="dark" lang="zh-TW">

<head>
    <link th:replace="~{ fragments/backendhead :: backHead}" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex">
    <!-- Sidebar Navigation -->
    <aside th:replace="~{ fragments/backendaside :: backaside('opera')}"> </aside>
    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-x-hidden">
        <!-- Header -->
        <header th:replace="~{ fragments/backendheader :: backendheader('帳號與營收管理', '監控平台運行狀況與用戶活動數據')}"></header>
        <div class="p-8 flex flex-col gap-8">
            <!-- Key Metrics -->
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-neutral-800/50 p-6 rounded-xl border border-neutral-700">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-neutral-400 text-sm font-medium">總營收 (NTD)</span>
                        <span class="material-symbols-outlined text-primary">payments</span>
                    </div>
                    <div class="flex items-end gap-3">
                        <span id="display-total-revenue" class="text-3xl font-bold text-slate-100"></span>
                        <span class="text-green-500 text-sm font-bold flex items-center mb-1">
                        </span>
                    </div>
                </div>
                <div class="bg-neutral-800/50 p-6 rounded-xl border border-neutral-700">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-neutral-400 text-sm font-medium">活躍用戶</span>
                        <span class="material-symbols-outlined text-primary">group</span>
                    </div>
                    <div class="flex items-end gap-3">
                        <span id="display-active-users" class="text-3xl font-bold text-slate-100"></span>
                        <span class="text-green-500 text-sm font-bold flex items-center mb-1">
                        </span>
                    </div>
                </div>


            </section>
            <!-- Revenue Chart Section -->
            <section class="bg-neutral-800/30 rounded-xl border border-neutral-700 p-6">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <span class="material-symbols-outlined">bar_chart</span> 營收統計趨勢 (2026)
                    </h3>
                    <div class="flex bg-neutral-800 rounded-lg p-1">
                        <button id="btn-monthly"
                            class="px-4 py-1.5 text-xs font-bold bg-neutral-700 text-white rounded-md hover:bg-neutral-600 transition-colors">月報</button>
                        <button id="btn-quarterly"
                            class="px-4 py-1.5 text-xs font-bold text-neutral-400 hover:text-white transition-colors">季報</button>
                    </div>
                </div>
                <div class="h-64 w-full">
                    <canvas id="revenueChart"></canvas>
                </div>
            </section>
            <!-- Account Maintenance Table -->
            <section class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <span class="material-symbols-outlined">person_search</span> 帳號維護管理
                    </h3>

                </div>
                <div class="overflow-hidden rounded-xl border border-neutral-700 bg-neutral-800/30">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-neutral-800">
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">用戶 ID
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">用戶名稱
                                </th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">電子郵件
                                </th>
                                <th
                                    class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider text-center">
                                    狀態</th>
                                <th
                                    class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider text-right">
                                    操作</th>
                            </tr>
                        </thead>
                        <tbody id="member-table-body" class="divide-y divide-neutral-700">

                        </tbody>
                    </table>
                    <div class="px-6 py-4 bg-neutral-800/50 flex items-center justify-between">
                        <p id="pagination-info" class="text-xs text-neutral-400">載入中...</p>

                        <div class="flex gap-2">
                            <button id="prev-page"
                                class="p-1 rounded bg-neutral-700 text-neutral-400 hover:text-white transition-colors disabled:opacity-50">
                                <span class="material-symbols-outlined text-sm">chevron_left</span>
                            </button>
                            <button id="next-page"
                                class="p-1 rounded bg-neutral-700 text-neutral-400 hover:text-white transition-colors disabled:opacity-50">
                                <span class="material-symbols-outlined text-sm">chevron_right</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="orderModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-background-dark/80 backdrop-blur-sm"></div>

            <div class="relative flex items-center justify-center min-h-screen p-4">
                <div
                    class="bg-neutral-dark border border-neutral-muted/30 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden transform transition-all">
                    <div
                        class="px-6 py-4 border-b border-neutral-muted/20 flex justify-between items-center bg-neutral-dark/50">
                        <h3 class="text-xl font-bold text-slate-100">訂單詳細資訊</h3>
                        <button onclick="closeModal()"
                            class="text-neutral-muted hover:text-slate-100 transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <div id="modalContent" class="p-8 max-h-[70vh] overflow-y-auto space-y-6 text-slate-200">
                        <div class="flex justify-center py-10">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                        </div>
                    </div>

                    <div class="px-6 py-4 border-t border-neutral-muted/20 text-right bg-neutral-dark/50">
                        <button onclick="closeModal()"
                            class="px-6 py-2 rounded-lg bg-neutral-dark border border-neutral-muted text-slate-300 hover:bg-neutral-muted/10 transition-colors text-sm font-bold">
                            關閉視窗
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/backend/operation.js"></script>
</body>

</html>
