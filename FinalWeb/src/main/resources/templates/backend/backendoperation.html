<!DOCTYPE html>

<html class="dark" lang="zh-TW">

<head>
    <link th:replace="~{ fragments/backendhead :: backHead}" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex">
    <!-- Sidebar Navigation -->
    <aside th:replace="~{ fragments/backendaside :: backaside('opera')}"> </aside>
    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-x-hidden">
        <!-- Header -->
        <header th:replace="~{ fragments/backendheader :: backendheader('帳號與營收管理', '監控平台運行狀況與用戶活動數據')}"></header>
        <div class="p-8 flex flex-col gap-8">
            <!-- Key Metrics -->
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-neutral-800/50 p-6 rounded-xl border border-neutral-700">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-neutral-400 text-sm font-medium">總營收 (NTD)</span>
                        <span class="material-symbols-outlined text-primary">payments</span>
                    </div>
                    <div class="flex items-end gap-3">
                        <span id="display-total-revenue" class="text-3xl font-bold text-slate-100"></span>
                        <span class="text-green-500 text-sm font-bold flex items-center mb-1">
                        </span>
                    </div>
                </div>
                <div class="bg-neutral-800/50 p-6 rounded-xl border border-neutral-700">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-neutral-400 text-sm font-medium">活躍用戶</span>
                        <span class="material-symbols-outlined text-primary">group</span>
                    </div>
                    <div class="flex items-end gap-3">
                        <span id="display-active-users" class="text-3xl font-bold text-slate-100"></span>
                        <span class="text-green-500 text-sm font-bold flex items-center mb-1">
                        </span>
                    </div>
                </div>


            </section>
            <!-- Revenue Chart Section -->
            <section class="bg-neutral-800/30 rounded-xl border border-neutral-700 p-6">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <span class="material-symbols-outlined">bar_chart</span> 營收統計趨勢 (2026)
                    </h3>
                    <div class="flex bg-neutral-800 rounded-lg p-1">
                        <button id="btn-monthly"
                            class="px-4 py-1.5 text-xs font-bold bg-neutral-700 text-white rounded-md hover:bg-neutral-600 transition-colors">月報</button>
                        <button id="btn-quarterly"
                            class="px-4 py-1.5 text-xs font-bold text-neutral-400 hover:text-white transition-colors">季報</button>
                    </div>
                </div>
                <div class="h-64 w-full">
                    <canvas id="revenueChart"></canvas>
                </div>
            </section>
            <!-- Account Maintenance Table -->
            <section class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <span class="material-symbols-outlined">person_search</span> 帳號維護管理
                    </h3>
                </div>
                <div class="overflow-hidden rounded-xl border border-neutral-700 bg-neutral-800/30">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-neutral-800">
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">用戶 ID</th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">用戶名稱</th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider">電子郵件</th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider text-center">狀態</th>
                                <th class="px-6 py-4 text-xs font-bold text-neutral-400 uppercase tracking-wider text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="member-table-body" class="divide-y divide-neutral-700">
                            <!-- Thymeleaf 伺服器端渲染 -->
                            <tr th:each="member : ${membersPage.content}"
                                class="hover:bg-neutral-700/30 transition-colors">
                                <td class="px-6 py-4 text-sm text-neutral-400 font-mono"
                                    th:text="'UID-' + ${member.memberId}"></td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="size-8 rounded-full bg-neutral-700 overflow-hidden"
                                             th:style="'background-image: url(' + (${member.memberImgUrl} ?: 'https://ui-avatars.com/api/?name=' + (${member.name} ?: 'User')) + '); background-size: cover; background-position: center;'">
                                        </div>
                                        <span class="text-sm font-medium text-slate-100"
                                              th:text="${member.name} ?: '未填寫姓名'"></span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-sm text-neutral-400" th:text="${member.email}"></td>
                                <td class="px-6 py-4 text-center">
                                    <span th:classappend="${member.role == 'ROLE_ADMIN'} ? 'bg-purple-500/20 text-purple-400' : 'bg-blue-500/20 text-blue-400'"
                                          class="px-2 py-1 text-[10px] font-bold rounded uppercase tracking-wider"
                                          th:text="${member.role == 'ROLE_ADMIN'} ? '管理員' : '一般會員'"></span>
                                    <span th:if="${member.deleted}"
                                          class="ml-1 px-2 py-1 text-[10px] font-bold bg-red-500/20 text-red-400 rounded uppercase">已停權</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex flex-row items-center justify-end gap-3">
                                        <!-- 查看詳情：所有人都顯示 -->
                                        <button th:onclick="'viewMemberDetails(' + ${member.memberId} + ')'"
                                                class="text-blue-400 hover:text-blue-300 text-xs font-bold flex items-center gap-1 transition-colors whitespace-nowrap">
                                            👁️ 查看詳情
                                        </button>
                                        <!-- 權限設定 & 停權：當自己時隱藏 -->
                                        <th:block th:unless="${member.memberId == currentAdminId}">
                                            <button th:onclick="'toggleMemberRole(' + ${member.memberId} + ')'"
                                                    class="text-purple-400 hover:text-purple-300 text-xs font-bold flex items-center gap-1 transition-colors whitespace-nowrap">
                                                🛡️ 權限設定
                                            </button>
                                            <button th:onclick="'toggleMemberStatus(' + ${member.memberId} + ')'"
                                                    th:classappend="${member.deleted} ? 'text-green-400 hover:text-green-300' : 'text-red-400 hover:text-red-300'"
                                                    class="text-xs font-bold flex items-center gap-1 transition-colors whitespace-nowrap"
                                                    th:text="${member.deleted} ? '✅ 啟用帳號' : '🚫 停權此帳號'">
                                            </button>
                                        </th:block>
                                    </div>
                                </td>
                            </tr>
                            <!-- 無資料時顯示 -->
                            <tr th:if="${membersPage.totalElements == 0}">
                                <td colspan="5" class="px-6 py-4 text-center text-neutral-500">目前沒有會員資料</td>
                            </tr>
                        </tbody>
                    </table>
                    <!-- 分頁列：用 Thymeleaf 渲染，翻頁改變 URL ?page=N -->
                    <div class="px-6 py-4 bg-neutral-800/50 flex items-center justify-between">
                        <p class="text-xs text-neutral-400">
                            顯示第
                            <span th:text="${membersPage.number * membersPage.size + 1}"></span>
                            到
                            <span th:text="${membersPage.number * membersPage.size + membersPage.numberOfElements}"></span>
                            之
                            <span th:text="${membersPage.totalElements}"></span>
                            位用戶
                        </p>
                        <div class="flex gap-2">
                            <a th:href="@{/backend/operation(page=${membersPage.number - 1})}"
                               th:classappend="${membersPage.first} ? 'pointer-events-none opacity-50' : 'hover:text-white'"
                               class="p-1 rounded bg-neutral-700 text-neutral-400 transition-colors">
                                <span class="material-symbols-outlined text-sm">chevron_left</span>
                            </a>
                            <a th:href="@{/backend/operation(page=${membersPage.number + 1})}"
                               th:classappend="${membersPage.last} ? 'pointer-events-none opacity-50' : 'hover:text-white'"
                               class="p-1 rounded bg-neutral-700 text-neutral-400 transition-colors">
                                <span class="material-symbols-outlined text-sm">chevron_right</span>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="orderModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-background-dark/80 backdrop-blur-sm"></div>

            <div class="relative flex items-center justify-center min-h-screen p-4">
                <div
                    class="bg-neutral-dark border border-neutral-muted/30 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden transform transition-all">
                    <div
                        class="px-6 py-4 border-b border-neutral-muted/20 flex justify-between items-center bg-neutral-dark/50">
                        <h3 class="text-xl font-bold text-slate-100">訂單詳細資訊</h3>
                        <button onclick="closeModal()"
                            class="text-neutral-muted hover:text-slate-100 transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>

                    <div id="modalContent" class="p-8 max-h-[70vh] overflow-y-auto space-y-6 text-slate-200">
                        <div class="flex justify-center py-10">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                        </div>
                    </div>

                    <div class="px-6 py-4 border-t border-neutral-muted/20 text-right bg-neutral-dark/50">
                        <button onclick="closeModal()"
                            class="px-6 py-2 rounded-lg bg-neutral-dark border border-neutral-muted text-slate-300 hover:bg-neutral-muted/10 transition-colors text-sm font-bold">
                            關閉視窗
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <input type="hidden" id="currentAdminId"
        th:value="${session.loginMember != null ? session.loginMember.memberId : ''}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/assets/toast.js"></script>
    <script src="/backend/operation.js"></script>
</body>

</html>
