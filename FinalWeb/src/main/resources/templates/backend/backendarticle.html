<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head>
    <th:block th:replace="~{fragments/backendhead :: backHead}"></th:block>
    <!-- UI Editor-->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css">
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">

    <div class="flex h-screen overflow-hidden">
        <aside th:replace="~{ fragments/backendaside :: backaside('content')}"> </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark">

            <header
                class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-white/10 bg-background-dark/80 backdrop-blur-md sticky top-0 z-10">
                <div class="flex flex-col">
                    <div class="hidden sm:flex items-center gap-2 text-slate-500 text-sm mb-1">
                        <span>內容管理</span>
                        <span class="material-symbols-outlined text-xs">chevron_right</span>
                        <span class="text-primary font-medium">新增聖地巡禮文章</span>
                    </div>
                    <h2 class="text-lg md:text-xl font-bold tracking-tight text-white">建立新的聖地巡禮文章</h2>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto flex flex-col bg-[#161210]">
                <div class="max-w-7xl w-full mx-auto p-4 md:p-8 flex-1">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">

                        <div class="lg:col-span-2 space-y-6">
                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <label class="block text-sm font-bold text-slate-300 mb-2">文章標題</label>
                                <input id="titleInput"
                                    class="w-full bg-[#1a1614] border border-white/10 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-600"
                                    placeholder="請輸入標題..." type="text" />
                            </section>

                            <section
                                class="bg-[#2d2620] rounded-xl border-2 border-primary/40 shadow-lg overflow-hidden flex flex-col">
                                <div id="editor"></div>
                            </section>
                        </div>

                        <div class="space-y-6">
                            <div id="coverUpload"
                                class="bg-[#2d2620] rounded-xl p-6 md:p-8 flex flex-col border-2 border-primary/40 shadow-lg items-center justify-center gap-3 cursor-pointer">
                                <span class="material-symbols-outlined text-4xl text-primary/60">
                                    cloud_upload
                                </span>
                                <p class="text-sm text-slate-200">點擊上傳封面</p>
                                <input type="file" id="coverInput" accept="image/*" hidden>
                            </div>
                            <img id="coverPreview" class="mt-3 rounded-lg hidden max-h-40 object-cover">
                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <h3 class="text-sm font-bold text-slate-300 mb-4">文章分類</h3>
                                <div class="relative">
                                    <input type="text" id="articleClass" list="classOptions"
                                        class="w-full bg-[#1a1614] border border-white/10 rounded-lg p-3 text-white outline-none placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary"
                                        placeholder="手動輸入或下拉選擇..." value="特色活動" />
                                    <datalist id="classOptions">
                                        <option value="特色活動"></option>
                                        <option value="活動"></option>
                                        <option value="會員限定"></option>
                                        <option value="比賽"></option>
                                        <option value="日本聖地獨旅"></option>
                                        <option value="朝聖地指南"></option>
                                        <option value="裝備推薦"></option>
                                        <option value="聖地美食"></option>
                                    </datalist>
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-3 text-slate-500 pointer-events-none">expand_more</span>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>

                <footer
                    class="sticky bottom-0 w-full bg-[#1a1614]/95 backdrop-blur-lg border-t border-white/10 p-4 px-4 md:px-8 flex flex-col sm:flex-row items-center justify-between gap-4 z-10">
                    <span id="saveTime">最後儲存：尚未儲存</span>
                    <div class="flex items-center justify-center w-full sm:w-auto gap-2 md:gap-4">
                        <button id="draftBtn" class="px-6 py-2 rounded-lg text-slate-400">儲存草稿</button>
                        <button id="previewBtn"
                            class="flex-1 sm:flex-none px-4 md:px-6 py-2 rounded-lg border-2 border-primary text-primary font-bold hover:bg-primary/10 text-sm md:text-base transition-colors">預覽</button>
                        <button id="publishBtn"
                            class="flex-[2] sm:flex-none px-6 md:px-8 py-2 rounded-lg bg-primary text-[#1a1614] font-black shadow-lg shadow-primary/20 text-sm md:text-base transition-all">發布文章</button>
                    </div>
                </footer>
            </div>
        </main>
    </div>
</body>
<!-- UI Editor-->
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/assets/toast.js}"></script>
<script th:src="@{/backend/backendarticle.js}"></script>

</html>
