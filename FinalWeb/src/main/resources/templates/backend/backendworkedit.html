<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/backendhead :: backHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside th:replace="~{ fragments/backendaside :: backaside('content')}"> </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark">

            <header
                class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-white/10 bg-background-dark/80 backdrop-blur-md sticky top-0 z-10">
                <div class="flex flex-col">
                    <div class="hidden sm:flex items-center gap-2 text-slate-500 text-sm mb-1">
                        <span>內容管理</span>
                        <span class="material-symbols-outlined text-xs">chevron_right</span>
                        <span class="text-primary font-medium">新增作品</span>
                    </div>
                    <h2 class="text-lg md:text-xl font-bold tracking-tight text-white">新增動畫、電影作品</h2>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto flex flex-col bg-[#161210]">
                <div class="max-w-7xl w-full mx-auto p-4 md:p-8 flex-1">
                    <form th:action="@{/backend/contentmanagement/work/update}" method="post"
                        class="lg:col-span-2 space-y-6">
                        <input type="hidden" name="workId" th:value="${getWork.workId}">
                        <input name="workName" th:value="${getWork.workName}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="請輸入作品名稱" type="text" />
                        <input name="onDate" th:value="${getWork.onDate}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            type="text" placeholder="點擊選擇首映日期" onfocus="this.type='date'; this.showPicker()"
                            onblur="if(!this.value) this.type='text'" />
                        <select name="workClass" id="type"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400">
                            <option disabled selected>選擇作品類型</option>
                            <option value="動畫" th:selected="${getWork.workClass == '動畫'}">動畫</option>
                            <option value="電影" th:selected="${getWork.workClass == '電影'}">電影</option>
                        </select>
                        <input name="workImg" th:value="${getWork.workImg}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品圖片引用網址" type="text" />
                        <textarea name="description" th:text="${getWork.description}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品簡介"></textarea>
                        <input name="director" th:value="${getWork.director}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品導演" type="text" />
                        <input name="writer" th:value="${getWork.writer}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品編劇" type="text" />
                        <input name="location" th:value="${getWork.location}"
                            class="w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品位置" type="text" />
                        <input name="movielength" id="choseMovie" th:value="${getWork.movielength}"
                            class="hidden w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品時長" type="text" />
                        <input name="episodes" id="choseAnime" th:value="${getWork.episodes}"
                            class="hidden w-full bg-[#1a1614] border border-primary/40 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-400"
                            placeholder="輸入作品集數" type="text" />
                        <button type="submit"
                            class="flex-[2] sm:flex-none px-6 md:px-8 py-2 rounded-lg bg-primary text-[#1a1614] font-black shadow-lg shadow-primary/20 text-sm md:text-base transition-all">
                            新增作品
                        </button>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <div th:if="${message != null}" id="toast"
        class="fixed top-5 left-1/2 -translate-x-1/2 z-50 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg">
        <p th:text="${message}"></p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function () {
            let initialType = $('#type').val();
            if (initialType === "動畫") {
                $('#choseAnime').removeClass('hidden');
            } else if (initialType === "電影") {
                $('#choseMovie').removeClass('hidden');
            }

            $('#type').on('change', function () {

                let selectedType = $(this).val();

                // 2. 關鍵修正：先把兩個欄位都加上 hidden (穿上隱身斗篷)
                $('#choseAnime, #choseMovie').addClass('hidden');

                // 3. 判斷邏輯
                if (selectedType === "動畫") {
                    console.log(selectedType);

                    $('#choseAnime').removeClass('hidden');
                } else if (selectedType === "電影") {
                    console.log(selectedType);
                    $('#choseMovie').removeClass('hidden');
                }
            })

            if ($("#toast").length > 0) {
                setTimeout(function () {
                    $("#toast").fadeOut('slow');
                }, 3000);
            }
        });
    </script>
</body>

</html>
