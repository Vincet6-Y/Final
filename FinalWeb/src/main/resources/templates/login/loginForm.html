<div th:fragment="loginForm" id="loginFormFace" class="card-face active">
    <div class="form-content">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-white mb-2">會員登入</h2>
            <p class="text-white/80">歡迎回來，開啟您的聖地探索之旅</p>
        </div>

        <form class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-medium text-white/80 ml-1">帳號</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">
                        person
                    </span>

                    <input
                        class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                        placeholder="請輸入您的帳號"
                        type="text" />
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-white/80 ml-1">密碼</label>
                <div class="relative group">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">
                        lock
                    </span>

                    <input
                        id="passwd"
                        class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-12 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                        placeholder="請輸入您的密碼"
                        type="password" />

                    <button
                        id="togglePasswdBtn"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-muted hover:text-primary"
                        type="button">
                        <span id="eyeIcon" class="material-symbols-outlined">visibility</span>
                    </button>
                </div>
            </div>

            <button
                class="w-full bg-primary hover:bg-primary/90 text-white dark:text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform hover:translate-y-[-2px] active:translate-y-0"
                type="submit">
                登入
            </button>

            <div class="relative py-4 flex items-center">
                <div class="flex-grow border-t border-neutral-border"></div>
                <span class="px-4 text-xs text-white/80 uppercase tracking-widest">其他登入方式</span>
                <div class="flex-grow border-t border-neutral-border"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors"
                    type="button">
                    <span class="material-symbols-outlined text-lg text-white">google</span>
                </button>

                <button
                    class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors"
                    type="button">
                    <span class="text-sm text-white">ＬＩＮＥ</span>
                </button>
            </div>

        </form>
    </div>
</div>
