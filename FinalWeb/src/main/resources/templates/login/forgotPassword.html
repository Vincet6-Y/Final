<!doctype html>
<html class="dark" lang="zh-Hant">
<head>
    <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
    <header th:replace="~{ fragments/header :: myHeader}"></header>

    <main class="flex-grow flex items-center justify-center py-16 px-6">
        <div class="w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-10 backdrop-blur-md">
            <div class="mb-8 text-center">
                <span class="material-symbols-outlined text-primary text-5xl">lock_reset</span>
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white mt-4">忘記密碼</h2>
                <p class="text-slate-900/60 dark:text-white/60 text-sm mt-2">
                    輸入您的 Email，我們將寄送重設連結
                </p>
            </div>

            <form th:action="@{/auth/forgot-password}" method="post" class="space-y-5">
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-neutral-muted group-focus-within:text-primary transition-colors">
                        mail
                    </span>
                    <input
                        name="email"
                        type="email"
                        required
                        placeholder="請輸入註冊 Email"
                        class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50" />
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-all">
                    寄送重設連結
                </button>

                <div class="text-center">
                    <a th:href="@{/auth}" class="text-sm text-primary hover:underline">← 返回登入頁</a>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    <th:block th:replace="~{login/toastInfo :: toast}"></th:block>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/assets/toast.js}"></script>
</body>
</html>
