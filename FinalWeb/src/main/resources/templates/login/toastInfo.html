<th:block th:fragment="toast">
    <div th:if="${toast != null}"
         id="toast"
         class="fixed top-40 left-1/2 -translate-x-1/2 z-[9999]
                flex items-center gap-3
                px-5 py-3 rounded-lg shadow-lg text-white
                opacity-0 -translate-y-6 scale-95"
         th:classappend="${toast.type == 'success'} ? ' bg-emerald-500' :
                         (${toast.type == 'error'} ? ' bg-red-500' : ' bg-slate-700')">

        <span class="material-symbols-outlined text-lg"
              th:text="${toast.type == 'success'} ? 'check_circle' :
                       (${toast.type == 'error'} ? 'error' : 'info')">
        </span>

        <span class="font-medium"
              th:text="${toast.message}">
        </span>
    </div>
</th:block>
