<!doctype html>
<html class="dark" lang="zh-Hant">
<head>
    <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
    <header th:replace="~{ fragments/header :: myHeader}"></header>

    <main class="flex-grow flex items-center justify-center py-16 px-6">
        <div class="w-full max-w-md bg-white/5 border border-white/10 rounded-2xl p-10 backdrop-blur-md">
            <div class="mb-8 text-center">
                <span class="material-symbols-outlined text-primary text-5xl">key</span>
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white mt-4">重設密碼</h2>
            </div>

            <!-- token 無效時顯示錯誤 -->
            <div th:if="${error != null}"
                 class="mb-6 rounded-lg bg-red-500/15 border border-red-400/30 px-4 py-3 text-sm text-red-200 text-center">
                <span th:text="${error}"></span>
                <br/>
                <a th:href="@{/auth/forgot-password}" class="text-primary hover:underline mt-2 inline-block">重新申請</a>
            </div>

            <!-- token 有效時才顯示表單 -->
            <form th:if="${error == null}"
                  th:action="@{/auth/reset-password}" method="post" class="space-y-5">
                <input type="hidden" name="token" th:value="${token}" />

                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-neutral-muted group-focus-within:text-primary transition-colors">lock</span>
                    <input id="newPasswd" name="newPasswd" type="password" required
                        placeholder="新密碼（含大小寫英文及數字，至少 8 碼）"
                        class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-12 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50" />
                    <button type="button" onclick="togglePwd('newPasswd','eye1')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-neutral-muted hover:text-primary">
                        <span id="eye1" class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>

                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-neutral-muted group-focus-within:text-primary transition-colors">verified_user</span>
                    <input id="confirmPasswd" name="confirmPasswd" type="password" required
                        placeholder="確認新密碼"
                        class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-12 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50" />
                    <button type="button" onclick="togglePwd('confirmPasswd','eye2')"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 dark:text-neutral-muted hover:text-primary">
                        <span id="eye2" class="material-symbols-outlined">visibility_off</span>
                    </button>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg transition-all">
                    確認重設密碼
                </button>
            </form>
        </div>
    </main>

    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    <th:block th:replace="~{login/toastInfo :: toast}"></th:block>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/assets/toast.js}"></script>
    <script>
        function togglePwd(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body>
</html>
