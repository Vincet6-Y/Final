<!doctype html>

<html class="dark" lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#ff8c00",
              "background-light": "#f8f7f5",
              "background-dark": "#231a0f",
              "neutral-dark": "#362817",
              "neutral-border": "#4b3820",
              "neutral-muted": "#ceb18d",
            },
            fontFamily: {
              display: ["Space Grotesk", "Noto Sans TC", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <title>會員登入 - 聖地巡禮 Seichi Junrei</title>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col"
  >
    <!-- Top Navigation Bar -->
    <header
      th:fragment="myHeader"
      class="flex items-center justify-between border-b border-slate-200 dark:border-white/10 px-6 lg:px-20 py-4 bg-white dark:bg-background-dark sticky top-0 z-50"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-12 h-12 rounded-full overflow-hidden flex items-center justify-center p-0.5 shadow-lg shadow-primary/20"
        >
          <img
            alt="Seichi Junrei Logo"
            class="w-full h-full object-contain"
            th:src="@{/images/logo_noname.png}"
          />
        </div>
        <h1
          class="text-primary text-2xl font-bold tracking-tight"
          style="
            font-family:
              &quot;Noto Sans TC&quot;, &quot;PingFang TC&quot;, sans-serif;
          "
        >
          聖地巡禮
        </h1>
      </div>
      <nav class="hidden md:flex flex-1 justify-center items-center gap-10">
        <a
          class="text-slate-600 dark:text-slate-100 hover:text-primary transition-colors text-sm font-medium"
          href="#"
          >最新消息</a
        >
        <a
          class="text-slate-600 dark:text-slate-100 hover:text-primary transition-colors text-sm font-medium"
          href="#"
          >旅遊情報</a
        >
        <div class="relative group">
          <button
            class="flex items-center gap-1 text-slate-600 dark:text-slate-100 group-hover:text-primary transition-colors text-sm font-medium py-2"
          >
            聖地作品巡禮
            <span class="material-symbols-outlined text-sm"
              >keyboard_arrow_down</span
            >
          </button>
          <div
            class="absolute left-0 mt-0 w-40 bg-white dark:bg-zinc-800 rounded-lg shadow-xl border border-slate-100 dark:border-white/10 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50"
          >
            <a
              class="block px-4 py-3 text-sm text-slate-600 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-primary dark:hover:text-primary first:rounded-t-lg"
              href="#"
              >電影作品</a
            >
            <a
              class="block px-4 py-3 text-sm text-slate-600 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-white/5 hover:text-primary dark:hover:text-primary last:rounded-b-lg"
              href="#"
              >動畫作品</a
            >
          </div>
        </div>
        <a
          class="text-slate-600 dark:text-slate-100 hover:text-primary transition-colors text-sm font-medium"
          href="#"
          >行程規劃</a
        >
      </nav>
      <div class="flex items-center gap-4">
        <button
          aria-label="Toggle theme"
          class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-white/10 text-primary transition-all"
          onclick="document.documentElement.classList.toggle('dark')"
        >
          <span class="material-symbols-outlined theme-toggle-sun"
            >light_mode</span
          >
          <span class="material-symbols-outlined theme-toggle-moon"
            >dark_mode</span
          >
        </button>
        <!-- head CSS 不是直接放入而是引用時用這條
            <button aria-label="Toggle theme"
                class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-white/10 text-primary transition-all"
                onclick="document.documentElement.classList.toggle('dark')">

                <span class="material-symbols-outlined block dark:hidden">light_mode</span>

                <span class="material-symbols-outlined hidden dark:block">dark_mode</span>
            </button> -->
        <button
          class="bg-primary hover:bg-primary/90 text-white dark:text-background-dark px-6 py-2 rounded-lg text-sm font-bold transition-all"
        >
          會員登入
        </button>
      </div>
    </header>
    <main
      class="flex-grow flex items-center justify-center py-16 px-6 relative overflow-hidden"
    >
      <!-- Background decorative elements -->
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"
      ></div>
      <div
        class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-neutral-dark rounded-xl overflow-hidden shadow-2xl border border-neutral-border relative z-10"
      >
        <!-- Left Side: Login Form -->
        <div
          class="p-10 lg:p-16 border-b lg:border-b-0 lg:border-r border-neutral-border"
        >
          <div class="mb-10">
            <h2 class="text-3xl font-bold text-white mb-2">會員登入</h2>
            <p class="text-neutral-muted">歡迎回來，開啟您的聖地探索之旅</p>
          </div>
          <form class="space-y-6">
            <div class="space-y-2">
              <label class="text-sm font-medium text-neutral-muted ml-1"
                >帳號</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors"
                  >person</span
                >
                <input
                  class="w-full bg-background-dark border border-neutral-border rounded-lg py-4 pl-12 pr-4 text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-neutral-muted/50"
                  placeholder="請輸入您的帳號"
                  type="text"
                />
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-medium text-neutral-muted ml-1"
                >密碼</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors"
                  >lock</span
                >
                <input
                  class="w-full bg-background-dark border border-neutral-border rounded-lg py-4 pl-12 pr-12 text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-neutral-muted/50"
                  placeholder="請輸入您的密碼"
                  type="password"
                />
                <button
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-muted hover:text-primary"
                  type="button"
                >
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>
            <div class="flex items-center justify-between py-2">
              <label class="flex items-center gap-2 cursor-pointer group">
                <input
                  class="rounded border-neutral-border bg-background-dark text-primary focus:ring-primary size-4"
                  type="checkbox"
                />
                <span
                  class="text-sm text-neutral-muted group-hover:text-white transition-colors"
                  >記住我</span
                >
              </label>
              <a
                class="text-sm text-primary hover:underline underline-offset-4"
                href="#"
                >忘記密碼？</a
              >
            </div>
            <button
              class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform hover:translate-y-[-2px] active:translate-y-0"
            >
              登入
            </button>
            <div class="relative py-4 flex items-center">
              <div class="flex-grow border-t border-neutral-border"></div>
              <span
                class="px-4 text-xs text-neutral-muted uppercase tracking-widest"
                >其他登入方式</span
              >
              <div class="flex-grow border-t border-neutral-border"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <button
                class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors"
              >
                <span class="material-symbols-outlined text-lg">google</span>
                <span class="text-sm">Google</span>
              </button>
              <button
                class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors"
              >
                <span class="material-symbols-outlined text-lg"
                  >social_leaderboard</span
                >
                <span class="text-sm">Facebook</span>
              </button>
            </div>
          </form>
        </div>
        <!-- Right Side: Register Section -->
        <div
          class="relative overflow-hidden flex flex-col justify-center items-center text-center p-10 lg:p-16"
        >
          <div class="absolute inset-0 z-0">
            <img
              alt="Cinematic background"
              class="w-full h-full object-cover opacity-40"
              data-alt="Cinematic background image showing a Japanese shrine at sunset"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtiFU2yXVpdB3YN5EOpiNLrgWmf-jnk_hR4tjRyxsmtZWaPzGa5PYIHvbmpeHvce8sBkygKaednh35I3G5bgg85JGa52V85uuWVkmMRskHzScYSlu3KxDYreSrbzSBOnb6G0AI7G0tBHZ-CyrtSOzqBiDKUEiEUO-y1MhHLxyBHHLCGdRQqAFv_xtqlqCAX-d_MwERlUoWJlLrGxGLhN6ALqaxxfXmSbHp4K5RNRvnSA5Ut_UqNhYcp55Yhlk2SJnKOkOfgsPDS3o"
            />
            <div
              class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/60 to-transparent"
            ></div>
          </div>
          <div class="relative z-10 space-y-8">
            <div
              class="size-20 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center mx-auto border border-primary/30"
            >
              <span class="material-symbols-outlined text-primary text-4xl"
                >person_add</span
              >
            </div>
            <div>
              <h3 class="text-2xl font-bold text-white mb-4">還不是會員嗎？</h3>
              <p class="text-neutral-muted max-w-xs mx-auto">
                加入我們，記錄您的每一次朝聖足跡，與同好分享動漫世界的真實感動。
              </p>
            </div>
            <button
              class="bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md text-white px-10 py-4 rounded-lg font-bold transition-all hover:scale-105 active:scale-95"
            >
              點我註冊會員
            </button>
            <div class="pt-8">
              <p
                class="text-xs text-neutral-muted uppercase tracking-widest mb-4"
              >
                探索熱門聖地
              </p>
              <div class="flex justify-center -space-x-2">
                <div
                  class="size-8 rounded-full border-2 border-neutral-dark bg-slate-500 overflow-hidden"
                  title="東京"
                >
                  <img
                    alt="Avatar"
                    data-alt="Small round landscape thumbnail of Tokyo"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuDHEBWY-fgRtInTn5zq3qYF4m0_4RYeBJwduDuqtbWvF0XU2ucmtp8c7vnoCbqbvpHBHXvUL2h2qzAxfWkq6SvXJ5JryOiyCj8ae6OwuqpnXqK00wYVDLQ2IlS4dVPqkY9-jIzI5qfeEKqSeuhdTTFcu4Pdlb2tZ1O2kY8F06d76oUoVs09orRAqafhIGdvbK9EyNuZm2wR6hA2kU8C87YVCTJvcJBkUwZpXr8lh7z4NQCgD1Igzp7Ue8QaDanD3h_2uZAFovLdO9o"
                  />
                </div>
                <div
                  class="size-8 rounded-full border-2 border-neutral-dark bg-slate-400 overflow-hidden"
                  title="京都"
                >
                  <img
                    alt="Avatar"
                    data-alt="Small round landscape thumbnail of Kyoto"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSaXD3NoV8pgoTvdm8Eo1JWorOCCCj3-0V0QisZErYB9Qt1_jyw9By1TPjrsKlUHJyNJ7NTN4phQYml-VtI17m5JDuIpHf5dEn2AWXzgpJfqWJylAqUHAby5ecXKlf87Tz4iwYY5NU4NbVYYjzQXhsf08eF17vEnqLWHSCyK0XJ5IOzY65h0CusTN5xoGur6I432IgZl07-ALD1rw2i8WG7t4F7TT3AYz66d_NqWUYITy9FUISZvQkZBfUjWhaiDf8wpQYdeMBOPM"
                  />
                </div>
                <div
                  class="size-8 rounded-full border-2 border-neutral-dark bg-slate-300 overflow-hidden"
                  title="鎌倉"
                >
                  <img
                    alt="Avatar"
                    data-alt="Small round landscape thumbnail of Kamakura"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCjwiSHXzt-T8P0xjzwM7lUsEU8fJLKnvp8plaNHgQeUWIbBb42W9DgmYBxG9nfwKGxKKdCjK4A1ARdwQISbGV0YPe2LSobpdfCw5Sr-0HFUObDHOSaWr5mamllbDLLh9C8GSUDaoIoXFJkgHHP4F6sotSJifXEW5IxKbTMCJ5wvWRLVtQoTBLK-_6ityoO971owHbHSAeVcMxwz20b7gSNWnDTZ79rvH7ZwRmHyPjl8d_a9ogUJPteaZpd12iDcxE4cKDdPhqaC8w"
                  />
                </div>
                <div
                  class="size-8 rounded-full border-2 border-neutral-dark bg-primary flex items-center justify-center text-[10px] font-bold text-background-dark"
                >
                  +99
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- Footer -->
    <footer
      th:fragment="myFooter"
      class="bg-white dark:bg-background-dark border-t border-slate-200 dark:border-white/5 py-12 px-6 lg:px-20 transition-colors"
    >
      <div
        class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8"
      >
        <div class="flex flex-col items-center md:items-start gap-3">
          <div class="flex items-center gap-2">
            <div
              class="w-10 h-10 rounded-full overflow-hidden flex items-center justify-center p-0.5 shadow-lg shadow-primary/20"
            >
              <img
                alt="Seichi Junrei Logo"
                class="w-full h-full object-contain"
                th:src="@{/images/logo_noname.png}"
              />
            </div>
            <span
              class="text-primary text-xl font-bold tracking-tight"
              style="
                font-family:
                  &quot;Noto Sans TC&quot;, &quot;PingFang TC&quot;, sans-serif;
              "
              >聖地巡禮</span
            >
          </div>
          <p class="text-slate-500 text-sm">
            © 2026 Sacred Site Pilgrimage. All rights reserved.
          </p>
        </div>
        <div class="flex gap-8 text-slate-500 dark:text-slate-400 text-sm">
          <a class="hover:text-primary transition-colors" href="#"
            >隱私權政策</a
          >
          <a class="hover:text-primary transition-colors" href="#">服務條款</a>
          <a class="hover:text-primary transition-colors" href="#">常見問題</a>
        </div>
        <div
          class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-sm"
        >
          <span class="material-symbols-outlined text-sm">mail</span>
          <a
            class="hover:text-primary transition-colors"
            href="mailto:contact@pilgrimage.com"
            >seichi_junrei@gmail.com</a
          >
        </div>
      </div>
    </footer>
  </body>
</html>
