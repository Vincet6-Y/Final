<!doctype html>

<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header th:replace="~{ fragments/header :: myHeader}"> </header>

    <main class="flex-grow flex items-center justify-center py-16 px-6 relative overflow-hidden">
        <!-- Background decorative elements -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none">
        </div>
        <div
            class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-neutral-dark rounded-xl overflow-hidden shadow-2xl border border-neutral-border relative z-10">
            <!-- Left Side: Login Form -->
            <div class="p-10 lg:p-16 border-b lg:border-b-0 lg:border-r border-neutral-border">
                <div class="mb-10">
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">會員登入</h2>
                    <p class="text-neutral-muted">歡迎回來，開啟您的聖地探索之旅</p>
                </div>
                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-neutral-muted ml-1">帳號</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">person</span>
                            <input
                                class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                placeholder="請輸入您的帳號" type="text" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-neutral-muted ml-1">密碼</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">lock</span>
                            <input
                                id="passwd"
                                class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-12 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                placeholder="請輸入您的密碼" type="password" />
                            <button
                                id="togglePasswdBtn"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-muted hover:text-primary"
                                type="button">
                                <span id="eyeIcon" class="material-symbols-outlined">visibility_off</span>
                            </button>
                        </div>
                    </div>
                    <!-- <div class="flex items-center justify-between py-2">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <input
                                class="rounded border-neutral-border bg-background-dark text-primary focus:ring-primary size-4"
                                type="checkbox" />
                            <span class="text-sm text-neutral-muted group-hover:text-white transition-colors">記住我</span>
                        </label>
                        <a class="text-sm text-primary hover:underline underline-offset-4" href="#">忘記密碼？</a>
                    </div> -->
                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform hover:translate-y-[-2px] active:translate-y-0">
                        登入
                    </button>
                    <div class="relative py-4 flex items-center">
                        <div class="flex-grow border-t border-neutral-border"></div>
                        <span class="px-4 text-xs text-neutral-muted uppercase tracking-widest">其他登入方式</span>
                        <div class="flex-grow border-t border-neutral-border"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button
                            class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors">
                            <span class="material-symbols-outlined text-lg">google</span>
                        </button>
                        <button
                            class="flex items-center justify-center gap-2 border border-neutral-border rounded-lg py-3 hover:bg-white/5 transition-colors">
                            <span class="text-sm">ＬＩＮＥ</span>
                        </button>
                    </div>
                </form>
            </div>
            <!-- Right Side: Register Section -->
            <div class="relative overflow-hidden flex flex-col justify-center items-center text-center p-10 lg:p-16">
                <div class="absolute inset-0 z-0">
                    <img alt="Cinematic background" class="w-full h-full object-cover opacity-40"
                        data-alt="Cinematic background image showing a Japanese shrine at sunset"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtiFU2yXVpdB3YN5EOpiNLrgWmf-jnk_hR4tjRyxsmtZWaPzGa5PYIHvbmpeHvce8sBkygKaednh35I3G5bgg85JGa52V85uuWVkmMRskHzScYSlu3KxDYreSrbzSBOnb6G0AI7G0tBHZ-CyrtSOzqBiDKUEiEUO-y1MhHLxyBHHLCGdRQqAFv_xtqlqCAX-d_MwERlUoWJlLrGxGLhN6ALqaxxfXmSbHp4K5RNRvnSA5Ut_UqNhYcp55Yhlk2SJnKOkOfgsPDS3o" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/60 to-transparent">
                    </div>
                </div>
                <div class="relative z-10 space-y-8">
                    <div
                        class="size-20 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center mx-auto border border-primary/30">
                        <span class="material-symbols-outlined text-primary text-4xl">person_add</span>
                    </div>
                    <div>
                        <h3 class="text-2xl font-bold text-white mb-4">還不是會員嗎？</h3>
                        <p class="text-white dark:text-neutral-muted max-w-xs mx-auto">
                            加入我們，記錄您的每一次朝聖足跡，與同好分享動漫世界的真實感動。
                        </p>
                    </div>
                    <br>
                    <a th:href="@{/register}">
                        <button
                            class="bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md text-white px-10 py-4 rounded-lg font-bold transition-all hover:scale-105 active:scale-95">
                            點我註冊會員
                        </button>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/js/login.js}"></script>
</body>

</html>
