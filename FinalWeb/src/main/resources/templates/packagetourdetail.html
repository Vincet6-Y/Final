<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-hidden">
    <div class="relative flex h-screen w-full flex-col">
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 flex overflow-hidden relative">
            <div class="flex-1 relative bg-[#242424] overflow-hidden h-full" id="map-content">
                <div class="absolute inset-0 opacity-40 mix-blend-overlay pointer-events-none">
                    <div
                        class="w-full h-full bg-[radial-gradient(#333_1px,transparent_1px)] [background-size:20px_20px]">
                    </div>
                </div>
                <svg class="absolute inset-0 w-full h-full pointer-events-none">
                    <path class="marker-line" d="M 100 150 L 300 250 L 250 450 L 100 550" stroke-dasharray="8 4"></path>
                </svg>
                <div class="absolute top-[20%] left-[20%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                    <div
                        class="w-8 h-8 rounded-full bg-white text-background-dark font-bold flex items-center justify-center border-2 border-primary shadow-lg z-10">
                        1</div>
                    <div
                        class="mt-2 bg-white/10 backdrop-blur-md px-2 py-1 rounded text-xs text-white border border-white/20 whitespace-nowrap">
                        關西機場</div>
                </div>
                <div class="absolute top-[35%] left-[60%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                    <div
                        class="w-8 h-8 rounded-full bg-white text-background-dark font-bold flex items-center justify-center border-2 border-primary shadow-lg z-10">
                        2</div>
                    <div
                        class="mt-2 bg-white/10 backdrop-blur-md px-2 py-1 rounded text-xs text-white border border-white/20 whitespace-nowrap">
                        京都清水寺</div>
                </div>
                <div class="absolute top-[65%] left-[45%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                    <div
                        class="w-8 h-8 rounded-full bg-white text-background-dark font-bold flex items-center justify-center border-2 border-primary shadow-lg z-10">
                        3</div>
                    <div
                        class="mt-2 bg-white/10 backdrop-blur-md px-2 py-1 rounded text-xs text-white border border-white/20 whitespace-nowrap">
                        奈良公園</div>
                </div>
                <div class="absolute top-[80%] left-[25%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
                    <div
                        class="w-8 h-8 rounded-full bg-white text-background-dark font-bold flex items-center justify-center border-2 border-primary shadow-lg z-10">
                        4</div>
                    <div
                        class="mt-2 bg-white/10 backdrop-blur-md px-2 py-1 rounded text-xs text-white border border-white/20 whitespace-nowrap">
                        道頓堀</div>
                </div>
                <div class="absolute bottom-6 left-6 flex flex-col gap-2">
                    <button
                        class="w-10 h-10 bg-white dark:bg-zinc-800 text-slate-800 dark:text-white backdrop-blur-md rounded shadow-lg flex items-center justify-center hover:bg-primary transition-colors">
                        <span class="material-symbols-outlined">add</span>
                    </button>
                    <button
                        class="w-10 h-10 bg-white dark:bg-zinc-800 text-slate-800 dark:text-white backdrop-blur-md rounded shadow-lg flex items-center justify-center hover:bg-primary transition-colors">
                        <span class="material-symbols-outlined">remove</span>
                    </button>
                </div>
            </div>
            <div class="w-full lg:w-[500px] bg-white dark:bg-zinc-900 border-l border-slate-200 dark:border-white/10 flex flex-col h-full absolute lg:relative inset-0 lg:inset-auto z-40"

                    <button class="p-2 hover:bg-slate-100 dark:hover:bg-white/10 rounded-full transition-all">

                    </button>
                    <div class="flex items-center gap-2 md:gap-4">

                            class="flex items-center gap-2 text-sm font-bold text-primary hover:text-primary/80 transition-colors py-1 px-2 rounded-lg hover:bg-primary/5">
                            <span class="material-symbols-outlined"
                                style="font-variation-settings: 'FILL' 1;">favorite</span>
                            <span class="whitespace-nowrap">已收藏</span>

                        <button
                            class="bg-white/5 border border-slate-300 dark:border-white/20 px-3 md:px-4 py-1.5 rounded-full text-[10px] md:text-xs font-bold hover:bg-white/10 whitespace-nowrap">

                </div>

                                <span class="bg-primary/90 text-white text-[10px] px-2 py-0.5 rounded">官方合作</span>
                            </div>
                            <h2 class="text-white text-lg md:text-xl font-bold leading-tight">日本關西必遊路線：京都大阪奈良六天五夜</h2>
                            <div class="flex items-center gap-4 mt-2 text-white/60 text-[10px] md:text-xs">
                                <span>2024/05/10 發佈</span>
                                <span class="flex items-center gap-1"><span
                                        class="material-symbols-outlined text-xs">visibility</span> 15.2K 人都在用</span>
                            </div>
                        </div>
                    </div>
                    <div
                        class="flex border-b border-slate-100 dark:border-white/5 px-4 overflow-x-auto whitespace-nowrap no-scrollbar sticky top-0 bg-white dark:bg-zinc-900 z-20">
                        <button class="px-4 py-4 text-sm font-bold text-primary border-b-2 border-primary">總覽頁</button>
                        <button
                            class="px-4 py-4 text-sm font-medium text-slate-500 dark:text-white/40 hover:text-primary">第1天</button>
                        <button
                            class="px-4 py-4 text-sm font-medium text-slate-500 dark:text-white/40 hover:text-primary">第2天</button>
                        <button
                            class="px-4 py-4 text-sm font-medium text-slate-500 dark:text-white/40 hover:text-primary">第3天</button>
                        <button
                            class="px-4 py-4 text-sm font-medium text-slate-500 dark:text-white/40 hover:text-primary">第4天</button>
                        <button
                            class="px-4 py-4 text-sm font-medium text-slate-500 dark:text-white/40 hover:text-primary">第5天</button>
                    </div>
                    <div class="p-6 grid grid-cols-3 gap-4 border-b border-slate-100 dark:border-white/5">
                        <div class="text-center">
                            <div class="text-slate-500 dark:text-white/40 text-[10px] mb-1">行程</div>
                            <div class="font-bold text-lg">6天</div>
                        </div>
                        <div class="text-center">
                            <div class="text-slate-500 dark:text-white/40 text-[10px] mb-1">出遊時間</div>

                            <div class="text-slate-500 dark:text-white/40 text-[10px] mb-1">目的地</div>

                        <div class="relative pl-8 border-l-2 border-primary/30 space-y-3">
                            <div
                                class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-primary border-4 border-white dark:border-zinc-900">
                            </div>
                            <div
                                class="bg-white dark:bg-white/5 p-4 rounded-xl border border-slate-100 dark:border-white/10 shadow-sm">
                                <div class="flex gap-4">
                                    <img alt="Spot" class="w-20 h-20 rounded-lg object-cover flex-shrink-0"
                                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhjxt2R8wPviIqZXYUEi9kNxP_4s_bsJgGLXxREm6BsrEBY81VbhZmDLV__AjCs5HaiGR-fKnRuk2juWzGUdKukFlgsUPkSqgmGqDdATw6XmjORoaIIPhJV2FbRSPk19gcjSYVK3kO0pC0da6QA80hd1pur6hqGBJhoyxzj8pxYEu-1gV2nzuQd4DSsWI0UuXcJSHuPpgVvIOy6wdakbSRHhSdYHEBh8SJxIX8leko5dvVsQYGI9FCfdbxrdUydvgKs6yCTVpIneA" />
                                    <div class="flex-1">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <div
                                                    class="flex items-center gap-2 text-[10px] text-primary font-bold mb-1">
                                                    <span class="material-symbols-outlined text-sm">schedule</span>
                                                    08:00
                                                </div>
                                                <h4 class="font-bold text-sm md:text-base">心齋橋</h4>
                                            </div>
                                            <button class="text-slate-400 hover:text-primary transition-colors"><span
                                                    class="material-symbols-outlined text-lg">favorite</span></button>
                                        </div>
                                        <p class="text-xs text-slate-500 dark:text-white/40 mt-1">停留 1 小時</p>
                                    </div>
                                </div>
                                <div
                                    class="mt-3 flex items-center justify-between bg-orange-50 dark:bg-primary/10 border border-primary/20 p-2 rounded-lg">
                                    <span
                                        class="text-[10px] text-primary font-bold truncate pr-2">優惠【琵琶湖一日遊】大阪京都出發...</span>
                                    <span class="text-[10px] text-primary font-bold whitespace-nowrap">NT$2,467
                                        &gt;</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 text-[10px] text-slate-500 dark:text-white/40 pl-2">
                                <span class="material-symbols-outlined text-sm">directions_walk</span> 6 分
                            </div>
                        </div>
                        <div class="relative pl-8 border-l-2 border-primary/30 space-y-3">
                            <div
                                class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-primary border-4 border-white dark:border-zinc-900">
                            </div>
                            <div
                                class="bg-white dark:bg-white/5 p-4 rounded-xl border border-slate-100 dark:border-white/10 shadow-sm">
                                <div class="flex gap-4">
                                    <img alt="Spot" class="w-20 h-20 rounded-lg object-cover flex-shrink-0"
                                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBALblJhVb_NXtBzLX6MxSjNaGiKZiRixGNNNvT3Iexq4PtUq7MJZ6YBrniO_vVwl9RehxGFEy965Ux4thdMt3fLLhMrlNzDKuVyPzJ81AoZVK6QmYjD8xvJJG621BKJ1rsh6q4pracD-0Zqiz5jwguWslxWzymfHpKz6nPHLAmA0x80A1-TOz36ub_FrLy0Ncqu9oXTRHyQCpFY-5ihSv1pNCo3TWlPK1i58KuYab0ZGOAW8WrSM822vPVqLeQ65FJNo-vlotpxoM" />
                                    <div class="flex-1">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <div
                                                    class="flex items-center gap-2 text-[10px] text-primary font-bold mb-1">
                                                    <span class="material-symbols-outlined text-sm">schedule</span>
                                                    09:06
                                                </div>
                                                <h4 class="font-bold text-sm md:text-base">鈍屋拉麵 心齋橋店</h4>
                                            </div>
                                            <button class="text-slate-400 hover:text-primary transition-colors"><span
                                                    class="material-symbols-outlined text-lg">favorite</span></button>
                                        </div>
                                        <p class="text-xs text-slate-500 dark:text-white/40 mt-1">停留 1 小時</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="h-10"></div>
                    </div>
                </div>
                <div
                    class="p-4 md:p-6 bg-white dark:bg-zinc-900 border-t border-slate-100 dark:border-white/10 sticky bottom-0">
                    <button
                        class="w-full bg-[#0095f6] hover:bg-[#0081d6] text-white py-3 md:py-4 rounded-full font-bold flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 text-sm md:text-base transition-colors">
                        <span class="material-symbols-outlined text-xl">content_copy</span>
                        複製整個行程
                    </button>
                </div>
            </div>
        </main>
        <div
            class="mobile-view-toggle fixed bottom-24 left-1/2 -translate-x-1/2 bg-white dark:bg-zinc-800 rounded-full shadow-2xl border border-slate-200 dark:border-white/10 flex p-1 z-50 lg:hidden scale-110">
            <button
                class="flex items-center gap-1 px-4 py-2 rounded-full text-xs font-bold transition-all toggle-active"
                onclick="document.getElementById('itinerary-content').style.display='flex'; document.getElementById('map-content').style.display='none'; this.classList.add('toggle-active'); this.nextElementSibling.classList.remove('toggle-active');">
                <span class="material-symbols-outlined text-sm">list_alt</span>
                列表
            </button>
            <button class="flex items-center gap-1 px-4 py-2 rounded-full text-xs font-bold transition-all"
                onclick="document.getElementById('itinerary-content').style.display='none'; document.getElementById('map-content').style.display='block'; this.classList.add('toggle-active'); this.previousElementSibling.classList.remove('toggle-active');">
                <span class="material-symbols-outlined text-sm">map</span>
                地圖
            </button>
        </div>
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    </div>

</body>

</html>
