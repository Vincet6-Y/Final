<!DOCTYPE html>
<html class="dark" lang="zh-TW">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="min-h-screen selection:bg-orange-500/30 bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <header th:replace="~{ fragments/header :: myHeader}"> </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-12">
            <div class="flex items-center gap-2 text-xs text-gray-500 mb-4 uppercase tracking-widest font-bold">
                <span class="text-orange-500">Step 01</span>
                <span class="w-4 h-[1px] bg-gray-300 dark:bg-gray-700"></span>
                <span class="text-gray-800 dark:text-white">Step 02 確認付款</span>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">填寫訂單與支付</h1>
            <p class="text-gray-500">請確認您的聖地巡禮行程內容並完成支付程序。</p>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <section class="section-card rounded-xl p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1 h-6 bg-orange-500 rounded-full"></div>
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">行程摘要</h2>
                    </div>
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="w-full md:w-56 h-36 rounded-lg overflow-hidden flex-shrink-0">
                            <img alt="日本關西行程" class="w-full h-full object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbLcMmZwh16FnfkOoVi8_4skwM34Nq5WaGZXvk9ukM3To6113tQRms_5gn6R1cp_bMdEarK9QJdi9HTuBFlE7Lp_3N3AVMLo6-HZ0Gmkg1k-nM4NLt1-4oRIghTQQ2jqBV-60kdY1UEfhJnGLlqyC7c1-QwdZJT1cAfEXPrm6Ot0HpKXSdZliYJzmgCEB-jtMLTdchDCHR2rVxi7RJxV0XfRPEA_NxzdVjAC35Z62bBhUwrMXxC2pzsL_9nuRcnXrFwL0n9DcSteU" />
                        </div>
                        <div class="flex-grow">
                            <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-3">日本關西必遊路線：京都大阪奈良六天五夜
                                <div class="material-symbols-outlined text-orange-500 text-lg">border_color</div>
                            </h3>
                            
                            <div class="flex flex-wrap gap-6 text-sm text-gray-500 dark:text-gray-400 mb-6">
                                <div class="flex items-center gap-2">
                                    <span
                                        class="material-symbols-outlined text-orange-500 text-lg">calendar_today</span>
                                    <span>6 天 5 夜</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-outlined text-orange-500 text-lg">person</span>
                                    <span>1 位成人</span>
                                </div>
                            </div>
                            <div class="pt-6 border-t border-gray-200 dark:border-white/5">
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-3">預計出發日期
                                    <span class="text-orange-500/80 ml-1">(需大於今日 3 天)</span></label>
                                <div class="relative max-w-xs">
                                    <input
                                        class="input-field w-full px-4 py-3 text-sm font-medium text-gray-600 dark:text-black mb-2"
                                        id="travelDate" required="" type="date" />
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <section class="section-card rounded-xl p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1 h-6 bg-orange-500 rounded-full"></div>
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">加購付費項目</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">景點門票升級</label>
                            <select
                                class="input-field w-full px-4 py-3 text-sm font-medium text-gray-600 dark:text-black mb-2">
                                <option value="0">不需加購</option>
                                <option value="1200">清水寺快速通關 (+NT$1,200)</option>
                                <option value="2500">環球影城 VIP 套票 (+NT$2,500)</option>
                            </select>
                        </div>
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">交通票券加購</label>
                            <select
                                class="input-field w-full px-4 py-3 text-sm font-medium text-gray-600 dark:text-black mb-2">
                                <option value="0">不需加購</option>
                                <option value="800">JR West Pass 1日券 (+NT$800)</option>
                                <option value="2400">關西周遊卡 3日券 (+NT$2,400)</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">導覽服務</label>
                            <select
                                class="input-field w-full px-4 py-3 text-sm font-medium text-gray-600 dark:text-black mb-2">
                                <option value="0">無導覽服務</option>
                                <option value="3000">中文私人嚮導 (1日全程) (+NT$3,000)</option>
                                <option value="500">多國語言語音導覽機組 (+NT$500)</option>
                            </select>
                        </div>
                    </div>
                </section>
                <section class="section-card rounded-xl p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1 h-6 bg-orange-500 rounded-full"></div>
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">聯絡人資訊</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">旅客真實姓名</label>
                            <input class="input-field w-full px-4 py-3 text-sm" placeholder="請輸入證件姓名" type="text" />
                        </div>
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">電子郵件信箱</label>
                            <input class="input-field w-full px-4 py-3 text-sm" placeholder="example@email.com"
                                type="email" />
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-2">手機號碼</label>
                            <input class="input-field w-full px-4 py-3 text-sm" placeholder="0912-345-678" type="tel" />
                        </div>
                    </div>
                </section>
            </div>
            <div class="lg:col-span-4">
                <div class="sticky top-28 space-y-6">
                    <div class="section-card rounded-xl p-8">
                        <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-6">訂單金額明細</h2>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between items-center text-gray-500 dark:text-gray-400 text-sm">
                                <span>加購項目小計</span>
                                <span class="text-gray-900 dark:text-white font-medium">NT$ 3,200</span>
                            </div>
                            <div
                                class="pt-6 border-t border-gray-200 dark:border-white/5 flex justify-between items-end">
                                <span class="text-gray-600 dark:text-gray-300 font-medium text-sm">應付總額</span>
                                <div class="text-right">
                                    <span class="block text-[10px] text-orange-500 uppercase font-bold mb-1">Total
                                        Amount</span>
                                    <span class="text-3xl font-bold text-orange-500 tracking-tighter">NT$ 3,200</span>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-4 mb-8">
                            <label class="flex items-start gap-3 cursor-pointer group">
                                <div class="mt-1">
                                    <input
                                        class="w-4 h-4 rounded border-gray-300 dark:border-white/20 text-orange-600 focus:ring-orange-600 bg-white dark:bg-black/40"
                                        type="checkbox" />
                                </div>
                                <span
                                    class="text-xs text-gray-500 group-hover:text-gray-700 dark:group-hover:text-gray-400 transition-colors leading-normal">
                                    我已確認旅客資訊正確，並同意 <a class="text-orange-500 hover:underline" href="#">服務條款</a> 與 <a
                                        class="text-orange-500 hover:underline" href="#">隱私權聲明</a>。
                                </span>
                            </label>
                        </div>
                        <form th:action="@{/payment/checkout}" method="POST" class="w-full">
                            <button type="submit"
                                class="w-full btn-gradient py-4 rounded-xl font-bold text-lg shadow-xl text-gray-800 dark:text-gray-300 shadow-orange-950/20 transition-transform active:scale-[0.98] flex items-center justify-center gap-3">
                                <span>前往付款</span>
                                <span class="material-symbols-outlined font-bold">arrow_forward</span>
                            </button>
                        </form>
                    </div>
                    <div class="bg-orange-500/5 border border-orange-500/10 p-5 rounded-xl flex gap-4 section-card">
                        <span class="material-symbols-outlined text-orange-500/60">verified_user</span>
                        <div>
                            <h4 class="font-bold text-gray-800 dark:text-gray-300 text-xs mb-1">256-bit SSL 安全加密</h4>
                            <p class="text-[11px] text-gray-500 leading-relaxed">
                                您的支付資訊將受到銀行等級的加密保護。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    <script>
        const travelDateInput = document.getElementById('travelDate');
        const today = new Date();
        const minDate = new Date(today);
        minDate.setDate(today.getDate() + 3);
        const year = minDate.getFullYear();
        const month = String(minDate.getMonth() + 1).padStart(2, '0');
        const day = String(minDate.getDate()).padStart(2, '0');
        const minDateStr = `${year}-${month}-${day}`;
        travelDateInput.min = minDateStr;
        travelDateInput.value = minDateStr;
    </script>
</body>

</html>
