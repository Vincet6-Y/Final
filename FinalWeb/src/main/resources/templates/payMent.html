<!DOCTYPE html>
<html class="dark" lang="zh-TW" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="min-h-screen selection:bg-orange-500/30 bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <header th:replace="~{ fragments/header :: myHeader}"> </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-12">
            <div class="flex items-center gap-2 text-xs text-gray-500 mb-4 uppercase tracking-widest font-bold">
                <span class="text-orange-500">Step 01</span>
                <span class="w-4 h-[1px] bg-gray-300 dark:bg-gray-700"></span>
                <span class="text-gray-800 dark:text-white">Step 02 確認付款</span>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">填寫訂單與支付</h1>
            <p class="text-gray-500">請確認您的聖地巡禮行程內容並完成支付程序。</p>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <!-- ==================== 行程摘要 ==================== -->
                <section class="section-card rounded-xl p-8">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="w-1 h-6 bg-orange-500 rounded-full"></div>
                        <h2 class="text-xl font-bold text-gray-900 dark:text-white">行程摘要</h2>
                    </div>
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="w-full md:w-56 h-36 rounded-lg overflow-hidden flex-shrink-0">
                            <img alt="行程封面" class="w-full h-full object-cover"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbLcMmZwh16FnfkOoVi8_4skwM34Nq5WaGZXvk9ukM3To6113tQRms_5gn6R1cp_bMdEarK9QJdi9HTuBFlE7Lp_3N3AVMLo6-HZ0Gmkg1k-nM4NLt1-4oRIghTQQ2jqBV-60kdY1UEfhJnGLlqyC7c1-QwdZJT1cAfEXPrm6Ot0HpKXSdZliYJzmgCEB-jtMLTdchDCHR2rVxi7RJxV0XfRPEA_NxzdVjAC35Z62bBhUwrMXxC2pzsL_9nuRcnXrFwL0n9DcSteU" />
                        </div>
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-3" id="planNameDisplayBlock">
                                <h3 id="planNameDisplay" class="text-xl font-bold text-gray-900 dark:text-white"
                                    th:text="${order.myPlan != null && order.myPlan.myPlanName != null} ? ${order.myPlan.myPlanName} : '聖地巡禮行程'">
                                    聖地巡禮行程
                                </h3>
                                <button type="button" onclick="editPlanName()"
                                    class="text-orange-500 hover:text-orange-600 focus:outline-none transition-colors border-2 border-orange-500/20 rounded-full w-8 h-8 flex items-center justify-center">
                                    <span class="material-symbols-outlined text-sm">edit</span>
                                </button>
                            </div>
                            <div id="planNameEditBlock" class="hidden items-center gap-2 mb-3">
                                <input type="text" id="planNameInput"
                                    class="input-field rounded-lg px-3 py-2 text-sm border border-orange-500/50 dark:bg-[#251d15] dark:text-white w-64 focus:ring-2 focus:ring-orange-500 outline-none transition-all shadow-sm"
                                    th:value="${order.myPlan != null ? order.myPlan.myPlanName : '聖地巡禮行程'}" />
                                <button type="button" onclick="savePlanName()"
                                    class="bg-orange-500 hover:bg-orange-600 text-white rounded-lg px-4 py-2 text-sm font-bold shadow-md transition-colors">儲存</button>
                                <button type="button" onclick="cancelEditPlanName()"
                                    class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-sm font-medium transition-colors">取消</button>
                            </div>
                            <div class="flex items-center gap-3 mb-6">
                                <span class="material-symbols-outlined text-orange-500 text-lg">calendar_today</span>
                                <span id="displayStartDate" class="text-gray-600 dark:text-gray-300 font-bold"
                                    th:text="${order.myPlan != null && order.myPlan.startDate != null} ? ${order.myPlan.startDate} : '待選擇'"></span>
                            </div>
                            <!-- ==================== 預計出發日期 ==================== -->
                            <div class="pt-6 border-t border-gray-200 dark:border-white/5">
                                <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-3">
                                    預計出發日期 <span class="text-orange-500 ml-1">(修改後將同步更新行程)</span>
                                </label>

                                <input id="travelDate" type="date" required
                                    class="input-field w-full max-w-xs px-4 py-3 text-sm rounded-lg border border-gray-300 dark:border-orange-500/50 bg-white dark:bg-[#251d15] text-gray-900 dark:text-white focus:ring-2 focus:ring-orange-500 outline-none transition-all shadow-sm dark:[color-scheme:dark]"
                                    th:value="${order.myPlan != null ? order.myPlan.startDate : ''}" />
                            </div>
                        </div>
                </section>
                <!-- ==================== 已包含票券 ==================== -->
                <th:block th:replace="~{tickets:: includedTickets(${order.orderDetails})}" />
                <!-- ==================== 加購付費項目 ==================== -->
                <th:block
                    th:replace="~{tickets :: addonTickets(${availableTickets}, ${recommendedTransports}, ${purchasedNames}, ${otherTransports})}" />
            </div>
            <!-- ==================== 右側：訂單金額明細 ==================== -->
            <div class="lg:col-span-4">
                <div class="sticky top-28 space-y-6">

                    <form id="checkoutForm" th:action="@{/payment/checkout}" method="POST" class="w-full">
                        <div class="section-card rounded-xl p-8">
                            <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-6">訂單金額明細</h2>

                            <div class="space-y-4 mb-8">
                                <div th:each="detail : ${order.orderDetails}"
                                    th:id="'summary-db-' + ${detail.orderDetailId}"
                                    class="flex justify-between items-center text-gray-500 dark:text-gray-400 text-sm mb-2">
                                    <span class="flex items-center gap-2">
                                        <span
                                            class="material-symbols-outlined text-green-500 text-xs">check_circle</span>
                                        <span th:text="${detail.ticketType}">票券名稱</span>
                                    </span>
                                    <span class="text-gray-900 dark:text-white font-medium"
                                        th:text="'NT$ ' + ${detail.ticketPrice}">NT$ 0</span>
                                </div>

                                <input type="hidden" id="removeDetailIds" name="removeDetailIds" value="" />

                                <div id="summary-ticket-list" class="space-y-2 mb-2"></div>
                                <div id="summary-transport-list" class="space-y-2 mb-2"></div>

                                <div
                                    class="pt-6 border-t border-gray-200 dark:border-white/5 flex justify-between items-end">
                                    <span class="text-gray-600 dark:text-gray-300 font-medium text-sm">應付總額</span>
                                    <div class="text-right">
                                        <span class="block text-[10px] text-orange-500 uppercase font-bold mb-1">Total
                                            Amount</span>
                                        <span id="display-total"
                                            class="text-3xl font-bold text-orange-500 tracking-tighter"
                                            th:text="'NT$ ' + ${totalAmount}">NT$ 0</span>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-4 mb-8">
                                <label class="flex items-start gap-3 cursor-pointer group">
                                    <div class="mt-1">
                                        <input id="agreeCheckbox" required
                                            class="w-4 h-4 rounded border-gray-300 dark:border-white/20 text-orange-600 focus:ring-orange-600 bg-white dark:bg-black/40"
                                            type="checkbox" />
                                    </div>
                                    <span
                                        class="text-xs text-gray-500 group-hover:text-gray-700 dark:group-hover:text-gray-400 transition-colors leading-normal">
                                        我已確認旅客資訊正確，並同意 <a class="text-orange-500 hover:underline" href="#">服務條款</a> 與 <a
                                            class="text-orange-500 hover:underline" href="#">隱私權聲明</a>。
                                    </span>
                                </label>
                            </div>

                            <input type="hidden" name="orderId" th:value="${order.orderId}" />
                            <input type="hidden" id="checkoutPlanName" name="newPlanName" value="" />
                            <input type="hidden" id="checkoutStartDate" name="newStartDate" value="" />

                            <button id="checkoutBtn" type="submit"
                                class="w-full btn-gradient py-4 rounded-xl font-bold text-lg shadow-xl text-gray-800 dark:text-gray-300 shadow-orange-950/20 transition-transform active:scale-[0.98] flex items-center justify-center gap-3">
                                <span>前往付款</span>
                                <span class="material-symbols-outlined font-bold">arrow_forward</span>
                            </button>
                        </div>
                    </form>

                    <div class="bg-orange-500/5 border border-orange-500/10 p-5 rounded-xl flex gap-4 section-card">
                        <span class="material-symbols-outlined text-orange-500/60">verified_user</span>
                        <div>
                            <h4 class="font-bold text-gray-800 dark:text-gray-300 text-xs mb-1">256-bit SSL 安全加密</h4>
                            <p class="text-[11px] text-gray-500 leading-relaxed">
                                您的支付資訊將受到銀行等級的加密保護。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
    </main>
    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script th:inline="javascript">
        window.checkoutData = {
            myPlanId: /*[[${order.myPlan != null ? order.myPlan.myPlanId : null}]]*/ null,
            totalAmount: /*[[${totalAmount}]]*/ 0
        };
    </script>
    <script th:src="@{/payment/payment.js}"></script>

</body>

</html>
