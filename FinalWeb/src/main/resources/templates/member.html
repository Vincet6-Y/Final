<!DOCTYPE html>

<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header Section -->
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 w-full max-w-7xl mx-auto p-6 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar / Profile Stats -->
            <aside class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-white/5 border border-white/10 rounded-2xl p-8 flex flex-col items-center text-center">
                    <div class="relative mb-4">
                        <div class="size-32 rounded-full border-4 border-primary p-1">
                            <img alt="Profile Picture" class="w-full h-full object-cover rounded-full"
                                data-alt="Profile avatar of a happy young man"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZn0hF5odiTpTSvLLJlYC3FAJl-mVbD9Q7ubYgm7DvAcUSyRp43TqfRb1mZLIN8sapDa0aGJm2xOrg0H78C8c6Ses7XzltLJOwoCUFFWG5hoYHppigEM5D-4zzee5STn_MPefGID3DCWCLXW13xuVOfu07C0ndadqD3Qa_l7ffs4lkF_ohFVipsBhgCTJeVbPq7P5EMXQF12StVLfHdDXXWP1cy4kZooAXFCOPx9P2xizu0ZqgMNT3kIgFqhRlsKEvZuGJXQ-2gpc" />
                        </div>
                        <div
                            class="absolute bottom-1 right-1 bg-primary text-background-dark size-8 rounded-full flex items-center justify-center border-4 border-background-dark">
                            <span class="material-symbols-outlined text-sm">edit</span>
                        </div>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-100" th:text="'聖地旅者 · ' + ${session.loginMember.name}">
                    </h1>
                    <div class="w-full mt-8 flex justify-center">
                        <div
                            class="w-full max-w-[130px] flex flex-col items-center py-3 bg-white/5 rounded-xl border border-white/5">
                            <span class="text-3xl font-bold text-primary leading-none">12</span>
                            <span class="text-[14px] tracking-wider text-slate-400 mt-1">已收藏行程</span>
                        </div>
                    </div>
                    <div class="w-full mt-6 flex items-center gap-3">
                        <a th:href="@{/member/profile}"
                            class="w-1/2 py-3 bg-primary text-background-dark font-bold rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2 text-center">
                            <span>編輯資料</span>
                            <span class="material-symbols-outlined text-[20px]">edit</span>
                        </a>

                        <div class="relative w-1/2">
                            <button id="memberMenuBtn" type="button"
                                class="w-full py-3 bg-primary text-background-dark font-bold rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2">
                                <span>帳戶設定</span>
                                <span class="material-symbols-outlined text-[20px]">settings</span>
                            </button>

                            <div id="memberMenu"
                                class="absolute right-0 top-14 w-64 rounded-2xl bg-white dark:bg-zinc-900 shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden z-50">

                                <button type="button" id="openAccountModal"
                                    class="w-full flex items-center gap-3 px-4 py-4 text-sm text-left text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-white/5 transition border-b border-slate-200 dark:border-white/10">
                                    <span class="material-symbols-outlined text-[20px]">settings</span>
                                    帳戶設定
                                </button>

                                <a th:href="@{/member/logout}"
                                    class="flex items-center gap-3 px-4 py-4 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-white/5 transition">
                                    <span class="material-symbols-outlined text-[20px]">logout</span>
                                    登出
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Navigation List -->
                <div class="bg-white/5 border border-white/10 rounded-2xl p-2 hidden lg:flex flex-col">
                    <a id="nav-home"
                        class="cursor-pointer flex items-center gap-3 px-4 py-3 text-primary bg-primary/10 rounded-lg">
                        <span class="material-symbols-outlined">person</span>
                        <span class="font-medium">會員首頁</span>
                    </a>
                    <a id="nav-orders"
                        class="cursor-pointer flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-100 transition-colors">
                        <span class="material-symbols-outlined">map</span>
                        <span class="font-medium">購買紀錄</span>
                    </a>
                    <a id="nav-favs"
                        class="cursor-pointer flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-100 transition-colors">
                        <span class="material-symbols-outlined">history</span>
                        <span class="font-medium">收藏行程</span>
                    </a>
                </div>
            </aside>
            <!-- Main Content -->
            <div class="lg:col-span-8 flex flex-col gap-8">
                <!-- Purchase Records Section -->
                <div id="section-orders">
                    <th:block th:replace="~{member/purchaseRecord :: purchaseRecord}"></th:block>
                </div>
                <!-- Saved List Section -->

                <div id="section-favs">
                    <th:block th:replace="~{member/favoritePlan :: favoritePlan}"></th:block>
                </div>
            </div>
        </main>
        <!-- Footer Footer -->
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    </div>
    <th:block th:replace="~{member/purchaseModal :: purchaseModal}"></th:block>
    <th:block th:replace="~{member/accountModal :: accountModal}"></th:block>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(function () {
            // =========================
            // 帳戶設定的下拉選單
            // =========================
            const $memberMenuBtn = $("#memberMenuBtn");
            const $memberMenu = $("#memberMenu");

            $memberMenu.hide();
            $memberMenuBtn.on("click", function (e) {
                e.stopPropagation();
                $memberMenu.stop(true, true).slideToggle(180);
            });
            $(document).on("click", function (e) {
                if (!$(e.target).closest("#memberMenu, #memberMenuBtn").length) {
                    $memberMenu.stop(true, true).slideUp(180);
                }
            });

            // =========================
            // 🌟 側邊欄切換邏輯 (SPA 切換效果 - 終極雙向版)
            // =========================
            const $navHome = $("#nav-home");
            const $navOrders = $("#nav-orders");
            const $navFavs = $("#nav-favs");

            const $sectionOrders = $("#section-orders");
            const $sectionFavs = $("#section-favs");

            // 輔助函式：恢復側邊欄按鈕狀態
            function resetNav() {
                [$navHome, $navOrders, $navFavs].forEach($el => {
                    $el.removeClass("text-primary bg-primary/10").addClass("text-slate-400 hover:text-slate-100");
                });
            }

            // --- 1. 處理【會員首頁】 ---
            $navHome.on("click", function () {
                resetNav();
                $(this).removeClass("text-slate-400 hover:text-slate-100").addClass("text-primary bg-primary/10");

                // 顯示兩個區塊
                $sectionOrders.fadeIn(200);
                $sectionFavs.fadeIn(200);

                // 恢復初始狀態：隱藏多餘卡片，顯示查看全部按鈕
                $(".extra-order-card, .extra-fav-card").addClass("hidden");
                $("#btn-view-all-orders, #btn-view-all-favs").show();
            });

            // --- 2. 處理【購買紀錄】 ---
            function showAllOrders() {
                resetNav();
                $navOrders.removeClass("text-slate-400 hover:text-slate-100").addClass("text-primary bg-primary/10");

                $sectionFavs.hide(); // 隱藏收藏
                $sectionOrders.fadeIn(200);

                $(".extra-order-card").removeClass("hidden").hide().fadeIn(300); // 展開所有訂單
                $("#btn-view-all-orders").hide(); // 隱藏按鈕
            }

            $navOrders.on("click", showAllOrders);
            $(document).on("click", "#btn-view-all-orders", showAllOrders);

            // --- 3. 處理【收藏行程】 ---
            function showAllFavs() {
                resetNav();
                $navFavs.removeClass("text-slate-400 hover:text-slate-100").addClass("text-primary bg-primary/10");

                $sectionOrders.hide(); // 隱藏訂單
                $sectionFavs.fadeIn(200);

                $(".extra-fav-card").removeClass("hidden").hide().fadeIn(300); // 展開所有收藏
                $("#btn-view-all-favs").hide(); // 隱藏按鈕
            }

            $navFavs.on("click", showAllFavs);
            $(document).on("click", "#btn-view-all-favs", showAllFavs);
        });
    </script>
    <script th:src="@{/member/js/accountModal.js}"></script>
    <script th:src="@{/member/js/purchaseModal.js}"></script>
</body>

</html>
