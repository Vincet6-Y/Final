<!DOCTYPE html>
<html class="dark" lang="zh-TW">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header th:replace="~{ fragments/header :: myHeader}"></header>

    <main class="flex-grow flex items-center justify-center py-16 px-6 relative overflow-hidden">
        <!-- Background decorative elements -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] pointer-events-none">
        </div>

        <div id="authCard" class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-neutral-dark rounded-xl overflow-hidden shadow-2xl border border-neutral-border relative z-10">
            <!-- Left Side: Login Section -->
            <div id="registerImagePanel" class="relative overflow-hidden flex flex-col justify-center items-center text-center p-10 lg:p-16">
                <div class="absolute inset-0 z-0">
                    <img alt="Cinematic background" class="w-full h-full object-cover opacity-40"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBm9U7zHmVNhrqRKbW6_wG6XsmT5iJN2-nUld3yooX7EvAJp6UCsZLRhTqdDG2sm3KczM1RyfO8xWumhKXYBMl0cTrC1t8WMcQlT-xn_NlW7FM_8abbkx3floDMsJ9PfhRP6czybj_H9vhsm5QOuTcLeTth4_sfdmbbOzOTgxvOqM13RP9-zq4HdKjbkalKJ27iWoUYvTXfJSf0-iy8Ly_viqlAAnkvQvqMyeSwGA2EHJcTkc5uQP9c_WwRaPBwhfrhs-JnzIZ6qN4" />
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-background-dark via-background-dark/60 to-transparent">
                    </div>
                </div>

                <div class="relative z-10 space-y-8">
                    <div
                        class="size-20 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center mx-auto border border-primary/30">
                        <span class="material-symbols-outlined text-primary text-4xl">auto_awesome</span>
                    </div>

                    <div>
                        <h3 class="text-2xl font-bold text-white mb-4">已經是會員了嗎？</h3>
                        <p class="text-white dark:text-neutral-muted max-w-xs mx-auto">
                            回到登入頁面，開啟您的聖地探索之旅，繼續記錄每一次感動。
                        </p>
                    </div>
                    <br>
                    <a id="goLoginBtn" th:href="@{/login}">
                        <button
                            class="bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-md text-white px-10 py-4 rounded-lg font-bold transition-all hover:scale-105 active:scale-95">
                            點我登入會員
                        </button>
                    </a>
                </div>
            </div>

            <!-- Right Side: Register Form -->
            <div id="registerFormPanel" class="p-10 lg:p-16 border-b lg:border-b-0 lg:border-r border-neutral-border">
                <div class="mb-10">
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">註冊新會員</h2>
                    <p class="text-neutral-muted">請填寫以下資訊以完成您的帳戶註冊</p>
                </div>

                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-neutral-muted ml-1">姓名</label>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">badge</span>
                                <input
                                    class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                    placeholder="請輸入真實姓名" type="text" />
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-medium text-neutral-muted ml-1">信箱</label>
                        <div class="relative group">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">mail</span>
                            <input
                                class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                placeholder="example@mail.com" type="email" />
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-neutral-muted ml-1">電話</label>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">phone</span>
                                <input
                                    class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                    placeholder="0900-000-000" type="tel" />
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-medium text-neutral-muted ml-1">出生日期</label>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">calendar_today</span>
                                <input
                                class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50 dark:[color-scheme:dark]"
                                type="date" />
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-sm font-medium text-neutral-muted ml-1">密碼</label>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">lock</span>
                                <input
                                    id="registerPasswd"
                                    class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                    placeholder="請輸入密碼" type="password" />
                                    <button id="toggleRegisterPasswd"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-muted hover:text-primary"
                                        type="button">
                                        <span id="registerEyeIcon" class="material-symbols-outlined">visibility_off</span>
                                    </button>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-medium text-neutral-muted ml-1">確認密碼</label>
                            <div class="relative group">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-neutral-muted group-focus-within:text-primary transition-colors">verified_user</span>
                                <input
                                    id="registerConfirmPasswd"
                                    class="w-full bg-white dark:bg-background-dark border border-slate-300 dark:border-neutral-border rounded-lg py-4 pl-12 pr-4 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-neutral-muted/50"
                                    placeholder="請再次輸入密碼" type="password" />
                                <button id="toggleRegisterConfirmPasswd"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-muted hover:text-primary"
                                    type="button">
                                    <span id="registerConfirmEyeIcon" class="material-symbols-outlined">visibility_off</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="pt-2 space-y-4">
                        <button
                            class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform hover:translate-y-[-2px] active:translate-y-0 flex items-center justify-center gap-2 group"
                            type="submit">
                            <span>註冊帳號</span>
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>

                        <p class="text-center text-sm text-neutral-muted">
                            註冊即代表您同意聖地巡禮的
                            <a class="text-primary hover:underline underline-offset-4" href="#">服務條款</a>
                            與
                            <a class="text-primary hover:underline underline-offset-4" href="#">隱私政策</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script th:src="@{/memberJs/passwdEyeIcon.js}"></script>
</body>

</html>
