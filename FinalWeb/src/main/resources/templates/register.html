<!DOCTYPE html>

<html class="dark" lang="zh-TW">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
        <!-- Header -->
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 flex flex-col lg:flex-row w-full max-w-[1440px] mx-auto">
            <!-- Left Side: Branding/Hero -->
            <div
                class="w-full lg:w-1/2 p-6 md:p-12 lg:p-20 flex flex-col justify-center gap-8 border-b lg:border-b-0 lg:border-r border-neutral-border">
                <div class="rounded-xl overflow-hidden aspect-video lg:aspect-square relative group">
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-transparent z-10">
                    </div>
                    <div class="absolute inset-0 bg-primary/10 mix-blend-overlay"></div>
                    <div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-105"
                        data-alt="Traditional Japanese temple architecture at dusk"
                        style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBm9U7zHmVNhrqRKbW6_wG6XsmT5iJN2-nUld3yooX7EvAJp6UCsZLRhTqdDG2sm3KczM1RyfO8xWumhKXYBMl0cTrC1t8WMcQlT-xn_NlW7FM_8abbkx3floDMsJ9PfhRP6czybj_H9vhsm5QOuTcLeTth4_sfdmbbOzOTgxvOqM13RP9-zq4HdKjbkalKJ27iWoUYvTXfJSf0-iy8Ly_viqlAAnkvQvqMyeSwGA2EHJcTkc5uQP9c_WwRaPBwhfrhs-JnzIZ6qN4");'>
                    </div>
                    <div class="absolute bottom-8 left-8 z-20 max-w-md">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="material-symbols-outlined text-primary text-5xl">auto_awesome</span>
                        </div>
                        <h1 class="text-white text-4xl md:text-5xl font-black leading-tight tracking-tight mb-4">
                            加入聖地巡禮
                        </h1>
                        <p class="text-white text-accent-tan text-lg font-normal mb-8 leading-relaxed">
                            開啟您的專屬朝聖之旅，紀錄每一個感悟瞬間，與志同道合的旅人分享感動。
                        </p>
                        <button
                            class="flex min-w-[180px] cursor-pointer items-center justify-center rounded-lg h-14 px-6 bg-primary text-background-dark text-lg font-bold shadow-lg shadow-primary/20 hover:translate-y-[-2px] transition-all">
                            <span class="truncate">點我登入會員</span>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Right Side: Registration Form -->
            <div class="w-full lg:w-1/2 p-6 md:p-12 lg:p-20 flex flex-col">
                <div class="mb-10">
                    <h3 class="dark:text-slate-100 text-3xl font-bold mb-2">註冊新會員</h3>
                    <p class="text-accent-tan text-base">請填寫以下資訊以完成您的帳戶註冊</p>
                </div>
                <form class="flex flex-col gap-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">帳號</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">person</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    placeholder="請輸入帳號" type="text" />
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">姓名</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">badge</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    placeholder="請輸入真實姓名" type="text" />
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="dark:text-slate-200 text-sm font-medium">信箱</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">mail</span>
                            <input
                                class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                placeholder="example@mail.com" type="email" />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">電話</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">phone</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    placeholder="0900-000-000" type="tel" />
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">出生日期</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">calendar_today</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-500 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    type="date" />
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">密碼</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">lock</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    placeholder="請輸入密碼" type="password" />
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="dark:text-slate-200 text-sm font-medium">確認密碼</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-tan text-xl dark:text-gray-900">verified_user</span>
                                <input
                                    class="w-full pl-12 pr-4 py-4 rounded-lg bg-neutral-muted border border-neutral-border text-slate-100 focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-accent-tan/50"
                                    placeholder="請再次輸入密碼" type="password" />
                            </div>
                        </div>
                    </div>
                    <div class="mt-8 flex flex-col gap-4">
                        <button
                            class="w-full py-4 rounded-lg bg-primary text-background-dark font-bold text-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2 group"
                            type="submit">
                            <span>註冊帳號</span>
                            <span
                                class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                        <p class="text-center text-accent-tan text-sm">
                            註冊即代表您同意聖地巡禮的 <a class="text-primary hover:underline underline-offset-4" href="#">服務條款</a> 與
                            <a class="text-primary hover:underline underline-offset-4" href="#">隱私政策</a>
                        </p>
                    </div>
                </form>
            </div>
        </main>
        <!-- Footer Footer (minimal) -->
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    </div>
</body>

</html>
