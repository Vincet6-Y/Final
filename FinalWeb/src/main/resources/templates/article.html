<!DOCTYPE html>

<html class="dark" lang="zh-TW">

<head>
    <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
    <link rel="stylesheet" th:href="@{/article/css/article.css}">
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden font-display">
        <div class="layout-container flex h-full grow flex-col">
            <!-- Header -->
            <header th:replace="~{ fragments/header :: myHeader}"> </header>

            <!-- Main Content Container -->
            <main class="flex-1 w-full bg-white dark:bg-background-dark transition-colors duration-300">

                <!-- Hero Banner：優先用 articleImageUrl，沒有才用預設圖 -->
                <div class="relative w-full h-[50vh] md:h-[65vh] overflow-hidden">

                    <!-- ✅ 有封面圖時 -->
                    <div id="hero-bg"
                        th:if="${article?.articleImageUrl != null and !#strings.isEmpty(article?.articleImageUrl)}"
                        class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105"
                        th:style="'background-image: url(' + ${article.articleImageUrl} + ');'">
                    </div>
                    <!-- ✅ 無封面圖時 fallback -->
                    <div id="hero-bg-fallback"
                        th:unless="${article?.articleImageUrl != null and !#strings.isEmpty(article?.articleImageUrl)}"
                        class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 scale-105"
                        style="background-image: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop');">
                    </div>

                    <div class="absolute inset-0 bg-gradient-to-tr from-black/80 via-black/40 to-transparent"></div>

                    <div class="absolute inset-0 flex items-end pb-16">
                        <div class="w-full max-w-7xl mx-auto px-6 lg:px-20">
                            <div class="border-l-[12px] border-primary pl-8 md:pl-12">
                                <span id="article-class"
                                    class="text-primary font-bold tracking-[0.2em] text-sm md:text-base uppercase mb-4 block"
                                    th:text="${article?.articleClass}">分類名稱</span>

                                <h1 id="article-title"
                                    class="text-white text-4xl md:text-7xl font-black leading-[1.1] tracking-tighter max-w-4xl"
                                    th:text="${article?.title}">文章標題載入中...</h1>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="max-w-4xl mx-auto px-6 lg:px-20 py-16">
                    <!-- ✅ 動態日期與 Views -->
                    <div class="flex items-center gap-6 mb-12 text-slate-500 text-sm border-b border-white/10 pb-8">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                            <span th:if="${article?.createdTime != null}"
                                th:text="${#temporals.format(article.createdTime, 'yyyy-MM-dd')}">日期</span>
                            <span th:unless="${article?.createdTime != null}">—</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">visibility</span>
                            <span th:text="${(article?.viewCount != null ? article.viewCount : 0) + ' Views'}">0
                                Views</span>
                        </div>
                    </div>

                    <!-- ✅ Markdown 內容區塊，樣式改由 article.css 控制 -->
                    <div id="markdown-content" th:attr="data-markdown=${article?.content}" class="markdown-body">
                    </div>

                    <div class="mt-20 pt-10 border-t border-white/10">
                        <a id="back-link"
                            th:href="${article?.articleClass == '特色活動'} ? @{/info} : @{/news}"
                            class="inline-flex items-center gap-2 text-primary hover:gap-6 transition-all font-bold group">
                            <span
                                class="material-symbols-outlined transition-transform group-hover:-translate-x-2">west</span>
                            <span id="back-text"
                                th:text="${article?.articleClass == '特色活動'} ? '返回旅遊情報' : '返回最新消息'">返回</span>
                        </a>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <script th:src="@{/article/js/article.js}"></script>
        </div>
    </div>
</body>

</html>
