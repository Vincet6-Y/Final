<!doctype html>

<html class="dark" lang="zh-Hant">
  <head>
  <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
  </head>
  
  <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
      <div class="layout-container flex h-full grow flex-col">
        <!-- Header -->
        <header th:replace="~{ fragments/header :: myHeader}"></header>

        <!-- Main Content -->
        <main class="flex-1 flex justify-center py-10 px-4 md:px-0">
          <div class="layout-content-container flex flex-col max-w-[800px] flex-1">
            <div class="flex flex-col gap-2 mb-8">
              <h1 class="text-primary tracking-tight text-3xl font-bold">
                編輯個人資料
              </h1>
              <p class="text-slate-400 text-sm">
                管理您的帳號資訊與個人隱私設定，讓大家更認識您
              </p>
            </div>
            <form class="space-y-8">
              <!-- Profile Image Section -->
              <div class="bg-primary/5 p-6 rounded-xl border border-primary/10">
                <div class="flex flex-col md:flex-row items-center gap-8">
                  <div class="relative group">
                    <div
                      class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-32 border-4 border-primary/30"
                      data-alt="Large user avatar for editing"
                      style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuCWljJKr_SyYFR40yV_NF_kL4B5JpwjUgXJGZ1VEhcVXzSOhJ0MjReIhLWaHmsDlthO9ZHOdTEae6w0EY36BHJe0uk6YPVdAzvD2xFX0K0Vy3yVL8SqixlPlOorYg_CgTZaIDE53hsqspaovwl7shl65nMJ4Y3vFy7QPe8S_woLudGJfX6be-M0bOpLdDMNjDLbPHoSDDTfTBtwevz8xNA_LxXnzMmuE-4nomzjeSPPmEa3BRk4BmEn8kE61qvpqNvcgpSMkk6fGsw&quot;);">
                    </div>
                    <button
                      class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg hover:bg-orange-600 transition-colors"
                      type="button">
                      <span class="material-symbols-outlined text-sm">photo_camera</span>
                    </button>
                  </div>
                  <div class="flex flex-col items-center md:items-start gap-3">
                    <div class="text-center md:text-left">
                      <h3 class="text-white text-lg font-bold">修改大頭照</h3>
                      <p class="text-slate-400 text-sm mt-1">
                        建議尺寸 400x400 px，支援 JPG, PNG 格式
                      </p>
                    </div>
                    <div class="flex gap-3">
                      <button
                        class="px-5 py-2 bg-primary text-white text-sm font-bold rounded-lg hover:bg-orange-600 transition-colors"
                        type="button">
                        上傳新照片
                      </button>
                      <button
                        class="px-5 py-2 bg-background-dark border border-slate-600 text-slate-300 text-sm font-bold rounded-lg hover:bg-slate-800 transition-colors"
                        type="button">
                        移除
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <!-- Basic Information -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">暱稱</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    placeholder="請輸入暱稱"
                    type="text"
                    value="朝聖小行者" />
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1 flex items-center gap-1">
                    電子郵件
                    <span class="material-symbols-outlined text-[14px]">lock</span>
                  </span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-slate-800/50 text-slate-400 cursor-not-allowed p-3.5 text-base"
                    disabled=""
                    type="email"
                    value="pilgrim@example.com"/>
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">手機號碼</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    placeholder="09XX-XXX-XXX"
                    type="tel"
                    value="0912345678" />
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">出生日期</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    type="date"
                    value="1995-05-20" />
                </label>
                <div class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">性別</span>
                  <div class="flex gap-4">
                    <label class="flex-1 flex items-center justify-center gap-2 p-3.5 border border-slate-700 rounded-lg cursor-pointer bg-background-dark/50 hover:bg-primary/10 transition-colors">
                      <input
                        checked=""
                        class="text-primary focus:ring-primary bg-transparent border-slate-500"
                        name="gender"
                        type="radio"/>
                      <span class="text-white">男性</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 p-3.5 border border-slate-700 rounded-lg cursor-pointer bg-background-dark/50 hover:bg-primary/10 transition-colors">
                      <input
                        class="text-primary focus:ring-primary bg-transparent border-slate-500"
                        name="gender"
                        type="radio" />
                      <span class="text-white">女性</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 p-3.5 border border-slate-700 rounded-lg cursor-pointer bg-background-dark/50 hover:bg-primary/10 transition-colors">
                      <input
                        class="text-primary focus:ring-primary bg-transparent border-slate-500"
                        name="gender"
                        type="radio" />
                      <span class="text-white">其他</span>
                    </label>
                  </div>
                </div>
              </div>
              <!-- Bio Section -->
              <label class="flex flex-col gap-2">
                <span class="text-slate-300 text-sm font-medium px-1">個人簡介 / 座右銘</span>
                <textarea
                  class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base resize-none"
                  placeholder="分享你的朝聖故事或是心情語錄..."
                  rows="4">
                    熱愛日本動漫，正在規劃下一次的聖地巡禮之旅。希望能遇到志同道合的朋友！
                </textarea>
              </label>
              <!-- Action Buttons -->
              <div
                class="flex flex-col md:flex-row gap-4 pt-6 border-t border-slate-800">
                <button
                  class="flex-1 md:flex-none md:min-w-[160px] py-4 bg-primary text-white font-bold rounded-xl hover:bg-orange-600 transition-all shadow-lg shadow-primary/20"
                  type="submit">
                  儲存變更
                </button>
                <button
                  class="flex-1 md:flex-none md:min-w-[120px] py-4 bg-slate-800 text-slate-300 font-bold rounded-xl hover:bg-slate-700 transition-all"
                  type="button">
                  取消
                </button>
              </div>
            </form>
          </div>
        </main>
        <!-- Footer -->
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </body>
</html>
