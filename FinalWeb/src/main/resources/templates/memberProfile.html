<!doctype html>

<html class="dark" lang="zh-Hant">
  <head>
  <th:block th:replace="~{ fragments/head :: myHead}"></th:block>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  </head>
  
  <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen"
        th:attr="data-member-id=${session.loginMember.memberId}">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
      <div class="layout-container flex h-full grow flex-col">
        <!-- Header -->
        <header th:replace="~{ fragments/header :: myHeader}"></header>

        <!-- Main Content -->
        <main class="flex-1 flex justify-center py-10 px-4 md:px-0">
          <div class="layout-content-container flex flex-col max-w-[800px] flex-1">
            <div class="flex flex-col gap-2 mb-8">
              <h1 class="text-primary tracking-tight text-3xl font-bold">
                編輯個人資料
              </h1>
            </div>
            <form id="profileForm" th:action="@{/member/profile}" method="post" class="space-y-8">
              <input type="hidden" id="memberImgUrl" name="memberImgUrl" th:value="${member.memberImgUrl}">
              <input type="hidden" id="originalMemberImgUrl" th:value="${member.memberImgUrl}">
              <input type="hidden" id="defaultMemberImgUrl" th:value="${defaultMemberImgUrl}">
              <!-- Profile Image Section -->
              <div class="bg-primary/5 p-6 rounded-xl border border-primary/10">
                <div class="flex flex-col md:flex-row items-center gap-8">
                  <div class="relative group">
                      <div class="relative size-32">
                          <div id="avatarSkeleton"
                              class="w-full h-full rounded-full bg-slate-700 animate-pulse absolute inset-0">
                          </div>
                          <img id="memberAvatarPreview"
                              alt="會員頭像"
                              fetchpriority="high"
                              decoding="async"
                              class="size-32 rounded-full border-4 border-primary/30 object-cover opacity-0 transition-opacity duration-300"
                              th:src="${member.memberImgUrl != null and !#strings.isEmpty(member.memberImgUrl)
                                      ? member.memberImgUrl
                                      : defaultMemberImgUrl}"
                              onload="this.style.opacity='1'; document.getElementById('avatarSkeleton').style.display='none';"
                              onerror="this.src=document.getElementById('defaultMemberImgUrl').value; this.style.opacity='1'; document.getElementById('avatarSkeleton').style.display='none';" />
                      </div>
                      <div id="cropTriggerBtn" class="absolute bottom-0 right-0 w-9 h-9 rounded-full bg-primary flex items-center justify-center cursor-pointer">
                          <span class="material-symbols-outlined text-white text-sm">photo_camera</span>
                      </div>
                  </div>
                  <div class="flex flex-col items-center md:items-start gap-3">
                    <div class="text-center md:text-left">
                      <h3 class="text-white text-lg font-bold">修改大頭照</h3>
                      <p class="text-slate-400 text-sm mt-1">
                        建議尺寸 400x400 px，支援 JPG, PNG 格式
                      </p>
                    </div>
                    <div class="flex gap-3">
                      <input id="avatarFileInput" type="file" accept="image/png, image/jpeg" class="hidden">
                      <button id="uploadAvatarBtn"
                        class="px-5 py-2 bg-primary text-white text-sm font-bold rounded-lg hover:bg-orange-600 transition-colors"
                        type="button">
                        上傳新照片
                      </button>
                      <button
                        id="removeAvatarBtn"
                        class="px-5 py-2 bg-background-dark border border-slate-600 text-slate-300 text-sm font-bold rounded-lg hover:bg-slate-800 transition-colors"
                        type="button">
                        移除
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <!-- Basic Information -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">會員名稱</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    placeholder="請輸入會員名稱"
                    type="text"
                    name="name" 
                    th:value="${member.name}" />
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1 flex items-center gap-1">
                    電子郵件
                    <span class="material-symbols-outlined text-[14px]">lock</span>
                  </span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-slate-800/50 text-slate-400 cursor-not-allowed p-3.5 text-base"
                    disabled=""
                    type="email"
                    th:value="${member.email}"/>
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">手機號碼</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    placeholder="09XX-XXX-XXX"
                    type="tel"
                    name="phone"
                    th:value="${member.phone}" />
                </label>
                <label class="flex flex-col gap-2">
                  <span class="text-slate-300 text-sm font-medium px-1">出生日期</span>
                  <input
                    class="w-full rounded-lg border border-slate-700 bg-background-dark/50 text-white focus:ring-2 focus:ring-primary focus:border-transparent p-3.5 text-base"
                    type="date"
                    style="color-scheme: dark;"
                    name="birthday" 
                    th:value="${member.birthday}" />
                </label>
              </div>
              <!-- Action Buttons -->
              <div
                class="flex flex-col md:flex-row gap-4 pt-6 border-t border-slate-800">
                <button
                  class="flex-1 md:flex-none md:min-w-[160px] py-4 bg-primary text-white font-bold rounded-xl hover:bg-orange-600 transition-all shadow-lg shadow-primary/20"
                  type="submit">
                  儲存變更
                </button>
                <a th:href="@{/member}" 
                  class="flex-1 md:flex-none md:min-w-[120px] py-4 bg-slate-800 text-slate-300 font-bold rounded-xl hover:bg-slate-700 transition-all text-center">
                  取消
                </a>
              </div>
            </form>
          </div>
        </main>
        <!-- Footer -->
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>
      </div>
    </div>

    <!-- 裁切 Modal -->
    <div id="cropModal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
        style="display:none !important;">
        <div class="bg-zinc-900 rounded-2xl p-6 w-full max-w-lg flex flex-col gap-4">
            <h3 class="text-white font-bold text-lg">調整大頭照</h3>
            <div class="w-full overflow-hidden" style="max-height: 400px;">
                <img id="cropperImage" src="" alt="裁切預覽" class="max-w-full">
            </div>
            <div class="flex gap-3 justify-end mt-2">
                <button id="cropCancelBtn" type="button"
                    class="px-5 py-2 bg-slate-700 text-slate-300 font-bold rounded-lg hover:bg-slate-600 transition-colors">
                    取消
                </button>
                <button id="cropConfirmBtn" type="button"
                    class="px-5 py-2 bg-primary text-white font-bold rounded-lg hover:bg-orange-600 transition-colors">
                    確認裁切
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" th:src="@{/member/js/firebase/memberAvatarUpload.js}"></script>
  </body>
</html>
