<!DOCTYPE html>
<html class="dark" lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 py-12 px-6 lg:px-20 max-w-7xl mx-auto w-full">
            <div class="flex gap-4 mb-8">
                <!-- <button  有一個是被選擇的高亮樣式
                    class="flex-1 py-6 text-xl font-bold rounded-xl bg-primary text-white dark:text-background-dark shadow-lg shadow-primary/20 transition-all hover:scale-[1.02]"
                    style="">
                    電影作品
                </button> -->
                <button
                    class="flex-1 py-6 text-xl font-bold rounded-xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 hover:border-primary/50 transition-all hover:scale-[1.02]"
                    style="">
                    電影作品
                </button>
                <button
                    class="flex-1 py-6 text-xl font-bold rounded-xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 hover:border-primary/50 transition-all hover:scale-[1.02]"
                    style="">
                    動畫作品
                </button>
            </div>
            <div class="flex justify-end gap-3 mb-10">
                <a th:href="@{/workList?page=0&size=4&sortDir=DESC}"
                    class="px-6 py-2 rounded-full bg-primary/10 text-primary border border-primary/30 text-sm font-bold hover:bg-primary hover:text-white dark:hover:text-background-dark transition-all"
                    th:classappend="${sortNow == 'DESC'} 
                      ? 'bg-primary/10 text-primary border-primary/30' 
                      : 'bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-white/10 hover:border-primary/50 hover:text-primary'">
                    上映日期 - 近
                </a>
                <a th:href="@{/workList?page=0&size=4&sortDir=ASC}"
                    class="px-6 py-2 rounded-full bg-primary/10 text-primary border border-primary/30 text-sm font-bold hover:bg-primary hover:text-white dark:hover:text-background-dark transition-all"
                    th:classappend="${sortNow == 'ASC'} 
                      ? 'bg-primary/10 text-primary border-primary/30' 
                      : 'bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-white/10 hover:border-primary/50 hover:text-primary'">
                    上映日期 - 遠
                </a>
            </div>
            <div class="flex flex-col gap-8">
                <div th:each="work : ${works.content}"
                    class="flex flex-col lg:flex-row gap-6 p-6 rounded-2xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:border-primary/40 transition-all group">
                    <div class="w-full lg:w-[450px] h-64 lg:h-72 rounded-xl overflow-hidden shrink-0">
                        <img alt="IMAGE"
                            class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-700" 
                            th:src="${work.workImg}">
                    </div>
                    <div class="flex flex-col justify-between py-2 flex-1">
                        <div>
                            <div class="flex items-center gap-3 mb-4">
                                <span class="bg-primary/20 text-primary text-xs font-bold px-2 py-1 rounded" style=""
                                    th:text="${work.workClass}">動畫 / 電影</span>
                                <span class="text-slate-400 text-xs" style=""
                                    th:text="${work.onDate} + ' ' + 上映">2016-08-26 上映</span>
                            </div>
                            <h3 class="text-primary text-3xl font-black mb-4" th:text="${work.workName}">你的名字 (君の名は。)
                            </h3>
                            <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-lg mb-6"
                                th:text="${work.description}">
                                故事背景主要取景於東京與岐阜縣飛驒市。其中最著名的巡禮地莫過於東京新宿的「須賀神社前階梯」，是片尾男女主角重逢的經典場景。此外，信濃町站前的天橋、國立新美術館以及飛驒市圖書館也是粉絲必訪的聖地。
                            </p>
                        </div>
                        <div>
                            <button
                                class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white dark:text-background-dark px-8 py-3 rounded-lg font-bold transition-all w-fit shadow-lg shadow-primary/10"
                                style="">作品詳細介紹</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-16 flex justify-center">
                <nav class="flex items-center gap-2">
                    <a th:if="${page > 0}" th:href="@{/workList(page=${page-1}, size=4, sortDir=${sortNow})}"
                        class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors"
                        style="">
                        <span class="material-symbols-outlined" style="">chevron_left</span>
                    </a>

                    <th:block th:each="i : ${#numbers.sequence(0, works.totalPages - 1)}">

                        <div th:if="${i == works.number}" th:text="${i + 1}"
                            class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-white dark:text-background-dark font-bold">
                        </div>

                        <a th:unless="${i == works.number}" th:href="@{/workList(page=${i}, size=4, sortDir=${sortNow})}"
                            th:text="${i + 1}"
                            class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors">
                        </a>

                    </th:block>
                    <!-- <span th:text="${page + 1}"></span> / <span th:text="${works.totalPages}"></span> -->

                    <a th:if="${page+1 < works.totalPages}" th:href="@{/workList(page=${page+1}, size=4, sortDir=${sortNow})}"
                        class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors"
                        style="">
                        <span class="material-symbols-outlined" style="">chevron_right</span>
                    </a>
                </nav>
            </div>
        </main>
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    </div>

</body>

</html>
