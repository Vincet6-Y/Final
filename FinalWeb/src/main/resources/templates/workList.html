<!DOCTYPE html>
<html class="dark" lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{ fragments/head :: myHead}"></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300 overflow-x-hidden">
    <div class="relative flex min-h-screen w-full flex-col">
        <header th:replace="~{ fragments/header :: myHeader}"> </header>

        <main class="flex-1 py-12 px-6 lg:px-20 max-w-7xl mx-auto w-full">
            <div class="flex gap-4 mb-8">

                <a th:href="@{/workList(page=0, size=4, sortDir=${sortNow}, workClass='電影')}"
                    class="flex flex-1 items-center justify-center py-6 text-xl font-bold rounded-xl"
                    th:classappend="${classNow == '電影'}
                                    ?'bg-primary text-white border-primary dark:bg-primary dark:text-white dark:border-primary'
                                    :'bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 hover:border-primary/50 transition-all hover:scale-[1.02]'">
                    電影作品
                </a>
                <a th:href="@{/workList(page=0, size=4, sortDir=${sortNow}, workClass='動畫')}"
                    class="flex flex-1 items-center justify-center py-6 text-xl font-bold rounded-xl"
                    th:classappend="${classNow == '動畫'}
                                    ?'bg-primary text-white border-primary dark:bg-primary dark:text-white dark:border-primary'
                                    :'bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 text-slate-600 dark:text-slate-300 hover:border-primary/50 transition-all hover:scale-[1.02]'">

                    動畫作品
                </a>
            </div>

            <div class="flex flex-col lg:flex-row items-center justify-between gap-4 mb-10">

                <form th:action="@{/workList}" method="get"
                    class="flex flex-col lg:flex-row flex-wrap items-center gap-4 w-full lg:w-auto">

                    <input type="hidden" name="workClass" th:value="${classNow}" />
                    <input type="hidden" name="sortDir" th:value="${sortNow}" />

                    <div
                        class="flex items-center px-4 py-3 gap-3 bg-white dark:bg-white/5 rounded-xl border border-slate-200 dark:border-white/10 w-full lg:w-64 focus-within:border-primary/50 transition-colors dark:[color-scheme:dark]">
                        <span class="material-symbols-outlined text-primary">search</span>
                        <input name="keyword" th:value="${keywordNow}"
                            class="bg-transparent border-none focus:ring-0 text-slate-700 dark:text-white w-full placeholder-slate-400 outline-none"
                            placeholder="搜尋作品名稱..." type="text" />
                    </div>

                    <div
                        class="flex items-center gap-2 bg-white dark:bg-white/5 px-4 py-3 rounded-xl border border-slate-200 dark:border-white/10 w-full lg:w-fit">
                        <label
                            class="text-sm font-bold text-slate-600 dark:text-slate-300 whitespace-nowrap">年份區間：</label>

                        <select name="minYear"
                            class="bg-transparent border border-slate-300 dark:border-white/20 rounded-md px-2 py-1 text-sm dark:text-white outline-none focus:border-primary">
                            <option th:each="year : ${#numbers.sequence(1980, 2026)}" th:value="${year}"
                                th:text="${year}" th:selected="${year.toString() == minYearNow}"></option>
                        </select>

                        <span class="text-slate-400 font-bold">-</span>

                        <select name="maxYear"
                            class="bg-transparent border border-slate-300 dark:border-white/20 rounded-md px-2 py-1 text-sm dark:text-white outline-none focus:border-primary">
                            <option th:each="year : ${#numbers.sequence(1980, 2026)}" th:value="${year}"
                                th:text="${year}" th:selected="${year.toString() == maxYearNow}"></option>
                        </select>

                        <button type="submit"
                            class="px-4 py-1.5 bg-primary text-white text-sm font-bold rounded-md hover:bg-primary/90 transition-all whitespace-nowrap">
                            搜尋與篩選
                        </button>
                    </div>
                </form>

                <div class="flex gap-2 w-full lg:w-auto">
                    <a th:href="@{/workList(page=0, size=4, sortDir='DESC', workClass=${classNow}, minYear=${minYearNow}, maxYear=${maxYearNow}, keyword=${keywordNow})}"
                        class="flex-1 lg:flex-none text-center px-4 py-2 rounded-full border text-sm font-bold transition-all hover:bg-primary hover:text-white"
                        th:classappend="${sortNow == 'DESC'} 
                            ? 'bg-primary text-white border-primary' 
                            : 'bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-white/10'">
                        上映日期 - 近
                    </a>
                    <a th:href="@{/workList(page=0, size=4, sortDir='ASC', workClass=${classNow}, minYear=${minYearNow}, maxYear=${maxYearNow}, keyword=${keywordNow})}"
                        class="flex-1 lg:flex-none text-center px-4 py-2 rounded-full border text-sm font-bold transition-all hover:bg-primary hover:text-white"
                        th:classappend="${sortNow == 'ASC'} 
                            ? 'bg-primary text-white border-primary' 
                            : 'bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-white/10'">
                        上映日期 - 遠
                    </a>
                </div>

            </div>
            <div class="flex flex-col gap-8">
                <div th:each="work : ${works.content}"
                    class="flex flex-col lg:flex-row gap-6 p-6 rounded-2xl bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:border-primary/40 transition-all group">
                    <div class="w-full lg:w-[450px] h-64 lg:h-72 rounded-xl overflow-hidden shrink-0">
                        <img alt="IMAGE"
                            class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-700"
                            th:src="${work.workImg}">
                    </div>
                    <div class="flex flex-col justify-between py-2 flex-1">
                        <div>
                            <div class="flex items-center gap-3 mb-4">
                                <span class="bg-primary/20 text-primary text-xs font-bold px-2 py-1 rounded"
                                    th:text="${work.workClass}">動畫 / 電影</span>
                                <span class="text-slate-400 text-xs" th:text="${work.onDate} + ' ' + 上映">2016-08-26
                                    上映</span>
                            </div>
                            <h3 class="text-primary text-3xl font-black mb-4" th:text="${work.workName}">你的名字 (君の名は。)
                            </h3>
                            <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-lg mb-6"
                                th:text="${work.description}">
                                故事背景主要取景於東京與岐阜縣飛驒市。其中最著名的巡禮地莫過於東京新宿的「須賀神社前階梯」，是片尾男女主角重逢的經典場景。此外，信濃町站前的天橋、國立新美術館以及飛驒市圖書館也是粉絲必訪的聖地。
                            </p>
                        </div>
                        <div>
                            <a class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white dark:text-background-dark px-8 py-3 rounded-lg font-bold transition-all w-fit shadow-lg shadow-primary/10"
                                th:href="@{/workListDetail(workId=${work.workId})}">作品詳細介紹</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-16 flex justify-center">
                <nav class="flex items-center gap-2">
                    <a th:if="${page > 0}"
                        th:href="@{/workList(page=${page - 1}, size=4, sortDir=${sortNow}, workClass=${classNow}, minYear=${minYearNow}, maxYear=${maxYearNow}, keyword=${keywordNow})}"
                        class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">chevron_left</span>
                    </a>

                    <th:block th:each="i : ${#numbers.sequence(0, works.totalPages - 1)}">

                        <div th:if="${i == works.number}" th:text="${i + 1}"
                            class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-white dark:text-background-dark font-bold">
                        </div>

                        <a th:unless="${i == works.number}"
                            th:href="@{/workList(page=${i}, size=4, sortDir=${sortNow}, workClass=${classNow}, minYear=${minYearNow}, maxYear=${maxYearNow}, keyword=${keywordNow})}"
                            th:text="${i + 1}"
                            class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors">
                        </a>

                    </th:block>
                    <!-- <span th:text="${page + 1}"></span> / <span th:text="${works.totalPages}"></span> -->

                    <a th:if="${page + 1 < works.totalPages}"
                        th:href="@{/workList(page=${page + 1}, size=4, sortDir=${sortNow}, workClass=${classNow})}"
                        class="w-10 h-10 flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 text-slate-400 hover:text-primary transition-colors">
                        <span class="material-symbols-outlined">chevron_right</span>
                    </a>
                </nav>
            </div>
        </main>
        <footer th:replace="~{ fragments/footer :: myFooter}"></footer>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const minYearSelect = document.querySelector('select[name="minYear"]');
            const maxYearSelect = document.querySelector('select[name="maxYear"]');

            function syncYears() {
                if (!minYearSelect || !maxYearSelect) return;

                const minVal = parseInt(minYearSelect.value);
                const maxVal = parseInt(maxYearSelect.value);

                // 1. 如果「最大年份」小於「最小年份」，自動將最大年份設為最小年份
                if (maxVal < minVal) {
                    maxYearSelect.value = minVal;
                }

                // 2. 處理 maxYear 下拉選單：禁用所有小於 minYear 的選項
                Array.from(maxYearSelect.options).forEach(option => {
                    const optVal = parseInt(option.value);
                    option.disabled = (optVal < minVal);
                });

                // 3. 處理 minYear 下拉選單：禁用所有大於 maxYear 的選項
                Array.from(minYearSelect.options).forEach(option => {
                    const optVal = parseInt(option.value);
                    option.disabled = (optVal > parseInt(maxYearSelect.value));
                });
            }

            // 綁定事件：當選單改變時執行同步
            if (minYearSelect && maxYearSelect) {
                minYearSelect.addEventListener('change', syncYears);
                maxYearSelect.addEventListener('change', syncYears);

                // 網頁剛載入時，先執行一次初始化狀態
                syncYears();
            }
        });
    </script>
</body>

</html>
