<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/backendhead :: backHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside th:replace="~{ fragments/backendaside :: backaside('content')}"> </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark">

            <header
                class="flex items-center justify-between px-8 py-4 border-b border-neutral-700 bg-background-dark/50 backdrop-blur-md sticky top-0 z-10">
                <div class="flex flex-col">
                    <div class="flex items-center gap-2 text-slate-500 text-sm mb-1">
                        <span>內容管理</span>
                        <span class="material-symbols-outlined text-xs">chevron_right</span>
                        <span class="text-primary font-medium">新增巡禮文章</span>
                    </div>
                    <h2 class="text-xl font-bold tracking-tight text-slate-100">新增巡禮文章</h2>
                    <p class="text-neutral-400 text-sm">建立新的動漫聖地巡禮記錄與讀者分享您的故事。</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-xl">search</span>
                        <input
                            class="bg-neutral-800 border-none rounded-lg pl-10 pr-4 py-2 text-sm w-64 focus:ring-1 focus:ring-primary text-slate-100"
                            placeholder="搜尋作品、行程或關鍵字..." type="text" />
                    </div>
                    <button class="p-2 rounded-lg bg-neutral-800 text-neutral-400 hover:text-white relative">
                        <span class="material-symbols-outlined">notifications</span>
                        <span class="absolute top-2 right-2 size-2 bg-primary rounded-full"></span>
                    </button>
                    <div class="size-10 rounded-full border-2 border-neutral-600 bg-cover bg-center"
                        data-alt="Administrator profile avatar"
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCUUTy1gTT3eSRCjNIclzcbEbKRvqQsrTLoRLVgxz83nD8zImAihi0VitbwTNQ-MAF2noeaQ4sXUQDiNlLyakkyYL_pge8xx6TpYpD-cKi5JCm_LfyI-aWFBKKwGF86HfTfEjxOoHvKGd_z3J4P5hR6Wdaw-Wz0mPw7alP_8996rrO0BFfc1Gob17sZvHf-l-cpFieDmMaBsHmuOlC6dhpPGjb7xpk7URi-Lbfd3fpzT_husXUTzMyYKhDa2tL14H_LLU0icqDIHdQ')">
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto flex flex-col">
                <div class="max-w-5xl w-full mx-auto p-8 flex-1">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-6">
                            <section
                                class="bg-white dark:bg-stone-700 rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
                                <label
                                    class="block text-sm font-bold text-slate-900 dark:text-slate-100 mb-2">文章標題</label>
                                <input
                                    class="w-full bg-slate-50 dark:bg-black/40 border-slate-200 dark:border-slate-800 rounded-lg focus:ring-primary focus:border-primary text-slate-900 dark:text-white p-4 transition-all"
                                    placeholder="請輸入令人驚豔的標題..." type="text" />
                            </section>

                            <section
                                class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden flex flex-col">
                                <div
                                    class="bg-slate-100 dark:bg-stone-700 p-2 flex flex-wrap gap-1 border-b border-slate-200 dark:border-slate-800">
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="粗體">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">format_bold</span>
                                    </button>
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="斜體">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">format_italic</span>
                                    </button>
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="清單">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">format_list_bulleted</span>
                                    </button>
                                    <div class="w-[1px] h-6 bg-slate-300 dark:bg-slate-700 self-center mx-1"></div>
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="插入連結">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">link</span>
                                    </button>
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="插入圖片">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">add_photo_alternate</span>
                                    </button>
                                    <div class="w-[1px] h-6 bg-slate-300 dark:bg-slate-700 self-center mx-1"></div>
                                    <button
                                        class="p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md transition-colors"
                                        title="引用">
                                        <span
                                            class="material-symbols-outlined text-slate-700 dark:text-slate-300">format_quote</span>
                                    </button>
                                </div>
                                <textarea
                                    class="w-full bg-white dark:bg-black/30 border-none focus:ring-0 text-slate-900 dark:text-white p-6 min-h-[400px] resize-none"
                                    placeholder="在此開始撰寫巡禮心得與攻略..."></textarea>
                            </section>
                        </div>

                        <div class="space-y-6">
                            <section
                                class="bg-white dark:bg-stone-700 rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
                                <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-4">封面圖上傳</h3>
                                <div
                                    class="border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl p-8 flex flex-col items-center justify-center gap-3 hover:border-primary transition-all cursor-pointer bg-slate-50 dark:bg-slate-950/50">
                                    <span
                                        class="material-symbols-outlined text-4xl text-slate-400 dark:text-slate-600">cloud_upload</span>
                                    <div class="text-center">
                                        <p class="text-sm font-medium dark:text-slate-200">點擊或拖曳檔案至此</p>
                                        <p class="text-xs text-slate-500 mt-1">建議尺寸 1200x630 (PNG/JPG)</p>
                                    </div>
                                </div>
                            </section>

                            <section
                                class="bg-white dark:bg-stone-700 rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
                                <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-4">關聯作品</h3>
                                <div class="relative">
                                    <select
                                        class="w-full bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 rounded-lg focus:ring-primary focus:border-primary text-slate-900 dark:text-white p-3 appearance-none">
                                        <option disabled="" selected="" value="">選擇關聯作品...</option>
                                        <option value="1">鈴芽之旅</option>
                                        <option value="2">孤獨搖滾！</option>
                                        <option value="3">我推的孩子</option>
                                        <option value="4">你的名字</option>
                                    </select>
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-slate-400">expand_more</span>
                                </div>
                            </section>

                            <section
                                class="bg-white dark:bg-stone-700  rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
                                <h3 class="text-sm font-bold text-slate-900 dark:text-slate-100 mb-4">標籤設定</h3>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <span
                                        class="bg-primary/20 text-primary text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">
                                        夏季推薦 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
                                    </span>
                                    <span
                                        class="bg-primary/20 text-primary text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">
                                        聖地 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
                                    </span>
                                    <span
                                        class="bg-primary/20 text-primary text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">
                                        取景地 <span class="material-symbols-outlined text-xs cursor-pointer">close</span>
                                    </span>
                                </div>
                                <div class="relative">
                                    <input
                                        class="w-full bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 rounded-lg focus:ring-primary focus:border-primary text-slate-900 dark:text-white p-3 pr-10"
                                        placeholder="新增標籤並按回車..." type="text" />
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-3 text-slate-400">add</span>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>

                <footer
                    class="sticky bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 px-8 flex items-center justify-between z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] mt-auto">
                    <div class="flex items-center gap-4 text-slate-500 text-sm">
                        <span class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">schedule</span> 最後儲存於 14:20
                        </span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button
                            class="px-6 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">儲存草稿</button>
                        <button
                            class="px-6 py-2.5 rounded-lg border-2 border-primary text-primary font-bold hover:bg-primary/5 transition-colors">預覽文章</button>
                        <button
                            class="px-8 py-2.5 rounded-lg bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all">發布文章</button>
                    </div>
                </footer>
            </div>
        </main>
    </div>
</body>

</html>
