<!DOCTYPE html>
<html class="dark" lang="zh-Hant">

<head th:replace="~{ fragments/backendhead :: backHead}"></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <aside th:replace="~{ fragments/backendaside :: backaside('content')}"> </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark">

            <header
                class="flex items-center justify-between px-4 md:px-8 py-4 border-b border-white/10 bg-background-dark/80 backdrop-blur-md sticky top-0 z-10">
                <div class="flex flex-col">
                    <div class="hidden sm:flex items-center gap-2 text-slate-500 text-sm mb-1">
                        <span>內容管理</span>
                        <span class="material-symbols-outlined text-xs">chevron_right</span>
                        <span class="text-primary font-medium">新增巡禮文章</span>
                    </div>
                    <h2 class="text-lg md:text-xl font-bold tracking-tight text-white">新增巡禮文章</h2>
                    <p class="hidden md:block text-slate-400 text-sm">建立新的聖地巡禮記錄與讀者分享故事。</p>
                </div>

                <div class="flex items-center gap-2 md:gap-4">
                    <div class="relative hidden lg:block">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xl">search</span>
                        <input
                            class="bg-[#1a1614] border border-white/10 rounded-lg pl-10 pr-4 py-2 text-sm w-48 xl:w-64 focus:ring-1 focus:ring-primary text-slate-100"
                            placeholder="搜尋作品..." type="text" />
                    </div>
                    <button class="p-2 rounded-lg bg-[#2a2420] text-slate-400 hover:text-white border border-white/10">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                    <div class="size-8 md:size-10 rounded-full border-2 border-slate-600 bg-cover bg-center shrink-0"
                        style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCUUTy1gTT3eSRCjNIclzcbEbKRvqQsrTLoRLVgxz83nD8zImAihi0VitbwTNQ-MAF2noeaQ4sXUQDiNlLyakkyYL_pge8xx6TpYpD-cKi5JCm_LfyI-aWFBKKwGF86HfTfEjxOoHvKGd_z3J4P5hR6Wdaw-Wz0mPw7alP_8996rrO0BFfc1Gob17sZvHf-l-cpFieDmMaBsHmuOlC6dhpPGjb7xpk7URi-Lbfd3fpzT_husXUTzMyYKhDa2tL14H_LLU0icqDIHdQ')">
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto flex flex-col bg-[#161210]">
                <div class="max-w-7xl w-full mx-auto p-4 md:p-8 flex-1">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">

                        <div class="lg:col-span-2 space-y-6">
                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <label class="block text-sm font-bold text-slate-300 mb-2">文章標題</label>
                                <input
                                    class="w-full bg-[#1a1614] border border-white/10 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary text-white p-3 md:p-4 outline-none placeholder:text-slate-600"
                                    placeholder="請輸入標題..." type="text" />
                            </section>

                            <section
                                class="bg-[#2d2620] rounded-xl border-2 border-primary/40 shadow-lg overflow-hidden flex flex-col">
                                <div class="bg-[#1a1614] p-2 flex flex-wrap gap-1 border-b border-white/10">
                                    <button class="p-2 hover:bg-primary/20 rounded-md text-slate-300"><span
                                            class="material-symbols-outlined">format_bold</span></button>
                                    <button class="p-2 hover:bg-primary/20 rounded-md text-slate-300"><span
                                            class="material-symbols-outlined">format_italic</span></button>
                                    <button class="p-2 hover:bg-primary/20 rounded-md text-slate-300"><span
                                            class="material-symbols-outlined">format_list_bulleted</span></button>
                                    <div class="w-[1px] h-6 bg-white/10 self-center mx-1"></div>
                                    <button class="p-2 hover:bg-primary/20 rounded-md text-slate-300"><span
                                            class="material-symbols-outlined">link</span></button>
                                    <button class="p-2 hover:bg-primary/20 rounded-md text-slate-300"><span
                                            class="material-symbols-outlined">add_photo_alternate</span></button>
                                </div>
                                <textarea
                                    class="w-full bg-[#1a1614]/50 border-none focus:ring-0 text-white p-4 md:p-6 min-h-[350px] md:min-h-[450px] resize-none outline-none"
                                    placeholder="在此開始撰寫巡禮心得..."></textarea>
                            </section>
                        </div>

                        <div class="space-y-6">
                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <h3 class="text-sm font-bold text-slate-300 mb-4">封面圖上傳</h3>
                                <div
                                    class="border-2 border-dashed border-white/10 rounded-xl p-6 md:p-8 flex flex-col items-center justify-center gap-3 hover:border-primary/50 bg-[#1a1614] cursor-pointer">
                                    <span class="material-symbols-outlined text-4xl text-primary/60">cloud_upload</span>
                                    <p class="text-sm text-slate-200">點擊或拖曳檔案</p>
                                </div>
                            </section>

                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <h3 class="text-sm font-bold text-slate-300 mb-4">關聯作品</h3>
                                <div class="relative">
                                    <select
                                        class="w-full bg-[#1a1614] border border-white/10 rounded-lg p-3 text-white appearance-none outline-none">
                                        <option disabled selected>選擇作品...</option>
                                        <option>鈴芽之旅</option>
                                        <option>孤獨搖滾！</option>
                                    </select>
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-3 text-slate-500">expand_more</span>
                                </div>
                            </section>

                            <section class="bg-[#2d2620] rounded-xl p-4 md:p-6 border-2 border-primary/40 shadow-lg">
                                <h3 class="text-sm font-bold text-slate-300 mb-4">標籤設定</h3>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    <span
                                        class="bg-primary/20 text-primary border border-primary/30 text-[10px] md:text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">夏季推薦
                                        <span
                                            class="material-symbols-outlined text-xs cursor-pointer">close</span></span>
                                    <span
                                        class="bg-primary/20 text-primary border border-primary/30 text-[10px] md:text-xs font-bold px-3 py-1 rounded-full flex items-center gap-1">聖地
                                        <span
                                            class="material-symbols-outlined text-xs cursor-pointer">close</span></span>
                                </div>
                                <div class="relative">
                                    <input
                                        class="w-full bg-[#1a1614] border border-white/10 rounded-lg p-3 pr-10 text-white outline-none"
                                        placeholder="新增標籤..." />
                                    <span
                                        class="material-symbols-outlined absolute right-3 top-3 text-slate-500">add</span>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>

                <footer
                    class="sticky bottom-0 w-full bg-[#1a1614]/95 backdrop-blur-lg border-t border-white/10 p-4 px-4 md:px-8 flex flex-col sm:flex-row items-center justify-between gap-4 z-10">
                    <div class="hidden sm:flex items-center gap-4 text-slate-500 text-xs">
                        <span class="flex items-center gap-1"><span
                                class="material-symbols-outlined text-sm">schedule</span> 最後儲存於 14:20</span>
                    </div>
                    <div class="flex items-center justify-center w-full sm:w-auto gap-2 md:gap-4">
                        <button
                            class="flex-1 sm:flex-none px-4 md:px-6 py-2 rounded-lg text-slate-400 font-bold hover:bg-white/5 text-sm md:text-base transition-colors border border-transparent hover:border-white/10">儲存草稿</button>
                        <button
                            class="flex-1 sm:flex-none px-4 md:px-6 py-2 rounded-lg border-2 border-primary text-primary font-bold hover:bg-primary/10 text-sm md:text-base transition-colors">預覽</button>
                        <button
                            class="flex-[2] sm:flex-none px-6 md:px-8 py-2 rounded-lg bg-primary text-[#1a1614] font-black shadow-lg shadow-primary/20 text-sm md:text-base transition-all">發布文章</button>
                    </div>
                </footer>
            </div>
        </main>
    </div>
</body>

</html>
