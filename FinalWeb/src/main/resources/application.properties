spring.application.name=FinalWeb

# 單資料庫
spring.datasource.url=${GOOGLE_CLOUD_URL}
# spring.datasource.url=${TIDB_URL}

# 2. 獨立填寫帳號
spring.datasource.username=${GOOGLE_CLOUD_USER}
# spring.datasource.username=${TIDB_USER}

# 3. 獨立填寫密碼
spring.datasource.password=${GOOGLE_CLOUD_PASSWD}
# spring.datasource.password=${TIDB_PASWD}

# 4. 告訴 Spring Boot 我們是用 MySQL 的驅動程式來連線
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties..hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.thymeleaf.cache=false

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

google.maps.api-key=${GOOGLE_MAPS_API_KEY}

# 綠界金鑰設定環境變數
ecpay.merchant-id=${ECPAY_MERCHANT_ID}
ecpay.hash-key=${ECPAY_HASH_KEY}
ecpay.hash-iv=${ECPAY_HASH_IV}
ecpay.url=${ECPAY_URL}


# 1. 強制讓 Hibernate 在啟動時嘗試更新資料庫結構
spring.jpa.hibernate.ddl-auto=update

# 2. 讓 Hibernate 把執行的 SQL 印出來，這樣你才能看到它有沒有去改 decimal
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. 確保 Dialect 正確（TiDB 使用 MySQL 8 驅動）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# LINE Login OAuth 設定（第三方登入使用）
# callback-url 為 LINE 登入成功後導回本網站的 API
line.login.channel-id=${LINE_LOGIN_ID}
line.login.channel-secret=${LINE_LOGIN_SECRET}
line.login.callback-url=${LINE_LOGIN_URL}

# 本機開發
app.base-url=${APP_BASE_URL}

# Gmail SMTP 寄驗證信到email
spring.mail.host=${GMAIL_HOST_HOST}
spring.mail.port=${GMAIL_HOST_PORT}
spring.mail.username=${GMAIL_HOST_USERNAME}
spring.mail.password=${GMAIL_HOST_PASSWORD}
spring.mail.properties.mail.smtp.auth=${GMAIL_HOST_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${GMAIL_HOST_STARTTLS_ENABLE}

# Port 設定
server.port=${PORT:8080}

# 增加獲取連線的等待時間（毫秒），給雲端環境多一點緩衝
spring.datasource.hikari.connection-timeout=30000
# 測試連線是否存活
spring.datasource.hikari.keepalive-time=30000
# 2. 測試連線是否真的還活著（每次拿連線前都確認一下）
spring.datasource.hikari.connection-test-query=SELECT 1

# 3. 限制最大連線數（Render 免費版記憶體小，設 5~10 即可，不要太大）
spring.datasource.hikari.maximum-pool-size=5

# 4. 連線最長壽命（防止連線老化，建議設比 TiDB 的預設關閉時間短）
spring.datasource.hikari.max-lifetime=1800000